<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0f1117"/>
<title>متجر الفيب والشيشة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e8eaf0;--sub:#8b8fa8;
  --ac:#6c63ff;--gr:#22c55e;--rd:#ef4444;--am:#f59e0b;--in:#12151f;--st:#12151f;
  --sb:#13151f;--sbb:#22253a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,Arial,sans-serif;
  direction:rtl;background:var(--bg);color:var(--text);
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
}
*{-webkit-overflow-scrolling:touch;}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.app-inner{display:flex;flex:1;overflow:hidden;}
.sidebar{
  width:200px;background:var(--sb);border-left:1px solid var(--sbb);
  display:flex;flex-direction:column;height:100%;overflow-y:auto;
  transition:transform .25s ease;flex-shrink:0;
}
.main-area{flex:1;overflow-y:auto;padding:1rem;min-width:0;}
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;
}
.overlay.show{display:block;}

/* ── Topbar (mobile) ── */
.topbar{
  display:none;background:var(--sb);border-bottom:1px solid var(--sbb);
  padding:.65rem 1rem;align-items:center;gap:.75rem;flex-shrink:0;
}
.topbar h1{font-size:15px;font-weight:700;flex:1;
  background:linear-gradient(90deg,var(--ac),var(--gr));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.menu-btn{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:6px 10px;font-size:18px;cursor:pointer;
  flex-shrink:0;
}

/* ── Inputs ── */
input,select,textarea{
  font-family:inherit;font-size:16px;
  padding:11px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--in);color:var(--text);width:100%;
  text-align:right;direction:rtl;
  -webkit-appearance:none;appearance:none;
  outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--ac);}
input:disabled{opacity:.6;}
select{cursor:pointer;}

/* ── Buttons ── */
button{
  font-family:inherit;font-size:14px;cursor:pointer;
  border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text);padding:10px 16px;
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  white-space:nowrap;
}
.btn-primary{background:var(--ac);color:#fff;border:none;}
.btn-green{background:var(--gr);color:#fff;border:none;}
.btn-red{border-color:rgba(239,68,68,.4);color:var(--rd);}
.btn-outline-ac{border-color:var(--ac);color:var(--ac);}
.btn-sm{padding:7px 12px;font-size:13px;}
.btn-icon{padding:7px 10px;font-size:16px;}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:.75rem;}
.stat-card{background:var(--st);border:1px solid var(--border);border-radius:12px;padding:.8rem 1rem;}
.stat-card .lbl{font-size:11px;color:var(--sub);margin-bottom:3px;}
.stat-card .val{font-size:15px;font-weight:700;}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.span2{grid-column:1/-1;}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* ── Nav ── */
.nav-item{
  display:flex;align-items:center;
  width:100%;text-align:right;padding:10px 1rem;
  border:none;background:transparent;color:var(--sub);
  cursor:pointer;font-size:13px;font-family:inherit;
  border-right:3px solid transparent;
  white-space:nowrap;gap:4px;
}
.nav-item.active{background:rgba(108,99,255,.15);color:var(--ac);border-right-color:var(--ac);font-weight:700;}
.nav-logo{padding:1rem;border-bottom:1px solid var(--sbb);}
.nav-logo .store-name{font-weight:700;font-size:13px;background:linear-gradient(90deg,var(--ac),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-footer{padding:.75rem;border-top:1px solid var(--sbb);}
.nav-badge{background:var(--rd);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-right:4px;}

/* ── Misc ── */
.lbl{font-size:12px;color:var(--sub);margin-bottom:4px;display:block;}
.page-title{font-size:16px;font-weight:700;}
.saving-text{font-size:12px;color:var(--am);}
.badge{font-size:11px;border-radius:6px;padding:2px 8px;font-weight:600;}
.tag{font-size:11px;background:var(--st);border:1px solid var(--border);border-radius:5px;padding:2px 8px;color:var(--sub);}
.sep{height:1px;background:var(--border);margin:4px 0;}
.qty-box{font-size:20px;font-weight:700;border-radius:9px;padding:3px 14px;text-align:center;}
.qty-ctrl{width:30px;height:30px;border-radius:7px;font-size:18px;padding:0;}
.img-prev{width:70px;height:70px;object-fit:cover;border-radius:10px;margin-bottom:8px;display:block;}
.profit-hint{background:var(--st);border-radius:8px;padding:8px 12px;font-size:13px;}

/* ── Modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:600;padding:0;
}
.modal-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;
  padding:1.5rem;
  padding-bottom:calc(1.5rem + env(safe-area-inset-bottom));
}
@media(min-width:600px){
  .modal-bg{align-items:center;padding:1rem;}
  .modal-box{border-radius:18px;max-height:92vh;}
}

/* ── Product card ── */
.prod-card{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;}
.prod-info{flex:1;padding:.85rem;min-width:0;}
.prod-name{font-weight:700;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-price-col{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:.75rem;border-right:1px solid var(--border);min-width:100px;gap:4px;}
.prod-qty-col{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:.75rem;border-right:1px solid var(--border);min-width:100px;gap:4px;}
.prod-act-col{display:flex;flex-direction:column;justify-content:center;gap:5px;padding:.75rem;}
.prod-img{width:60px;display:flex;align-items:center;justify-content:center;padding:.5rem;border-right:1px solid var(--border);}
.prod-img img{width:48px;height:48px;object-fit:cover;border-radius:8px;}
.col-lbl{font-size:10px;color:var(--sub);margin-bottom:2px;}

/* ── Sale row ── */
.sale-row{display:flex;align-items:center;gap:8px;padding:.85rem 1rem;cursor:pointer;flex-wrap:wrap;}
.sale-meta{flex:1;min-width:110px;}
.sale-col{text-align:center;min-width:60px;}
.sale-col .lbl{font-size:10px;}

/* ── Auth ── */
.auth-wrap{
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);padding:1rem;overflow-y:auto;
}
.auth-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:2rem;
  width:100%;max-width:400px;
}
.auth-logo{text-align:center;margin-bottom:1.5rem;}
.auth-logo .emoji{font-size:48px;display:block;margin-bottom:6px;}
.auth-logo h2{font-size:20px;font-weight:700;background:linear-gradient(90deg,var(--ac),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-logo p{font-size:12px;color:var(--sub);margin-top:3px;}
.auth-field{margin-bottom:12px;}
.auth-field .lbl{font-size:12px;color:var(--sub);margin-bottom:5px;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-left:40px;}
.pw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;padding:4px;font-size:16px;color:var(--sub);cursor:pointer;}
.auth-err{font-size:13px;color:var(--rd);padding:10px;background:rgba(239,68,68,.1);border-radius:8px;text-align:center;margin-bottom:12px;}
.auth-btn{width:100%;padding:13px;font-size:16px;font-weight:700;margin-bottom:10px;border-radius:12px;}
.auth-hint{text-align:center;font-size:11px;color:var(--sub);margin-top:1rem;}
.theme-bar{display:flex;gap:5px;justify-content:center;margin-top:1.25rem;}
.theme-btn{padding:4px 10px;border-radius:12px;font-size:12px;}

/* ── Responsive ── */
@media(max-width:680px){
  .topbar{display:flex;}
  .sidebar{
    position:fixed;right:0;top:0;height:100%;z-index:500;
    transform:translateX(100%);width:230px;
  }
  .sidebar.open{transform:translateX(0);}
  .g2{grid-template-columns:1fr;}
  .g3{grid-template-columns:1fr 1fr;}
  .g4{grid-template-columns:1fr 1fr;}
  .hide-m{display:none!important;}
  .prod-card{flex-direction:column;}
  .prod-price-col,.prod-qty-col{flex-direction:row;border-right:none;border-top:1px solid var(--border);justify-content:space-around;min-width:unset;padding:.6rem;}
  .prod-act-col{flex-direction:row;border-top:1px solid var(--border);padding:.65rem;}
  .main-area{padding:.75rem;}
}
@media(min-width:681px){
  .topbar{display:none!important;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
const API="https://script.google.com/macros/s/AKfycbwgpvKIS5nK3j8c1ATj7OalqvAiij9mxjP9KrT-kSUBnuhG0rQFnlc-zheqQumei2BR/exec";
const STORE="متجر الفيب والشيشة";
const CATS=["جهاز فيب","سائل إلكتروني","شيشة","معسل","فحم","إكسسوارات","أخرى"];
const EXP_CATS=["عام","إيجار","رواتب","كهرباء","مياه","إنترنت","صيانة","نقل","أخرى"];
const ROLES={
  admin:{label:"مدير",color:"#6c63ff",p:["dashboard","inventory","addProduct","sales","dailyReport","debts","suppliers","expenses","returns","purchases","reports","accounts","notes","users","backup"]},
  accountant:{label:"محاسب",color:"#22c55e",p:["dashboard","accounts","reports","sales","dailyReport","expenses"]},
  warehouse:{label:"موظف مخزن",color:"#f59e0b",p:["dashboard","inventory","addProduct","returns"]},
  staff:{label:"موظف",color:"#8b8fa8",p:["dashboard","inventory","sales"]},
};
const PAGES=[
  {k:"dashboard",l:"🏠 الرئيسية"},{k:"inventory",l:"📦 المخزن"},{k:"addProduct",l:"➕ إضافة مادة"},
  {k:"sales",l:"📊 سجل المبيعات"},{k:"dailyReport",l:"📅 تقرير يومي"},
  {k:"debts",l:"💳 الديون"},{k:"suppliers",l:"🏭 الموردون"},
  {k:"expenses",l:"💸 المصروفات"},{k:"returns",l:"↩️ الطلبات الراجعة"},
  {k:"purchases",l:"🛒 قائمة الشراء"},{k:"reports",l:"📈 التقارير"},
  {k:"accounts",l:"💰 الحسابات"},{k:"notes",l:"📝 ملاحظات"},
  {k:"users",l:"👥 المستخدمون"},{k:"backup",l:"💾 النسخ الاحتياطي"},
];
const DA={id:"1",name:"المدير",phone:"07700000000",password:"admin123",role:"admin",status:"approved",perms:ROLES.admin.p};

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function today(){return new Date().toLocaleDateString("ar-IQ");}
function getInvNum(){const n=ls("inv_n",1000)+1;ss("inv_n",n);return n;}

async function apiGet(p){try{const r=await fetch(API+"?"+new URLSearchParams(p));return r.json();}catch{return{ok:false};}}
async function apiPost(b){try{const r=await fetch(API,{method:"POST",body:JSON.stringify(b)});return r.json();}catch{return{ok:false};}}

// ── حالة التطبيق ──────────────────────────────────────────
const S={
  user:ls("vs_user",null), screen:ls("vs_user",null)?"main":"login",
  page:"dashboard", sideOpen:false, saving:"",
  products:ls("vs_prod",[]), sales:ls("vs_sale",[]),
  notes:ls("vs_note",""), debts:ls("vs_debt",[]),
  suppliers:ls("vs_supp",[]), expenses:ls("vs_exp",[]),
  returns:ls("vs_ret",[]), pos:ls("vs_po",[]),
  users:ls("vs_users",[DA]),
  search:"", fCat:"الكل", editId:null, editF:{},
  form:{name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:"",image:""},
  fErr:"", saleM:null, sQty:1,
  cust:{name:"",phone:"",note:"",payType:"cash"}, cErr:"",
  sSrch:"", expSale:null, printInv:null, dDay:today(),
  dF:{customerName:"",phone:"",amount:"",note:"",date:today(),status:"unpaid"},
  suF:{name:"",phone:"",address:"",notes:""},
  exF:{title:"",amount:"",category:"عام",date:today(),notes:""},
  rtF:{productName:"",qty:"1",reason:"",date:today(),customerName:"",refundAmount:"",status:"pending"},
  po:{supplierName:"",date:today(),notes:"",discount:"0",items:[{name:"",qty:"1",price:""}]},
  userTab:"list", editUser:null,
  lPhone:"",lPass:"",lShow:false,lErr:"",
  rName:"",rPhone:"",rRole:"staff",rPass:"",rPass2:"",rErr:"",rOk:false,
};

// ── Helpers ──────────────────────────────────────────────
const can=p=>S.user?.perms?.includes(p);
const isA=()=>S.user?.role==="admin";
function sP(v){S.products=typeof v==="function"?v(S.products):v;ss("vs_prod",S.products);}
function sSa(v){S.sales=typeof v==="function"?v(S.sales):v;ss("vs_sale",S.sales);}
function sNo(v){S.notes=v;ss("vs_note",v);}
function sDe(v){S.debts=typeof v==="function"?v(S.debts):v;ss("vs_debt",S.debts);}
function sSu(v){S.suppliers=typeof v==="function"?v(S.suppliers):v;ss("vs_supp",S.suppliers);}
function sEx(v){S.expenses=typeof v==="function"?v(S.expenses):v;ss("vs_exp",S.expenses);}
function sRe(v){S.returns=typeof v==="function"?v(S.returns):v;ss("vs_ret",S.returns);}
function sPO(v){S.pos=typeof v==="function"?v(S.pos):v;ss("vs_po",S.pos);}
function sUs(v){S.users=typeof v==="function"?v(S.users):v;ss("vs_users",S.users);}
function up(obj){Object.assign(S,obj);render();}
function set(k,v){S[k]=v;render();}

function login(u){S.user=u;S.screen="main";ss("vs_user",u);render();}
function logout(){S.user=null;S.screen="login";localStorage.removeItem("vs_user");render();}

// ── DOM helper ───────────────────────────────────────────
function el(tag,cls,children,attrs){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style")Object.assign(e.style,v);
    else if(k.startsWith("data-"))e.setAttribute(k,v);
    else e[k]=v;
  });
  if(children!=null)(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return e;
}
function div(cls,children,style){if(!style)return el("div",cls,children,undefined);if(style.style)return el("div",cls,children,style);return el("div",cls,children,{style});}
function span(cls,txt,style){return el("span",cls,[txt],style?{style}:undefined);}
function makeBtn(text,cls,onClick,style){const b=el("button",cls,[text],style?{style}:undefined);if(onClick)b.addEventListener("click",onClick);return b;}
function mkInp(val,onChange,ph,type,style){
  const i=el("input","",null,{type:type||"text",placeholder:ph||"",...(style?{style}:{})} );
  i.value=val||"";i.addEventListener("input",e=>onChange(e.target.value));return i;
}
function mkSel(val,opts,onChange,style){
  const s=el("select","",null,style?{style}:{});
  opts.forEach(o=>{const op=document.createElement("option");op.value=typeof o==="object"?o.v:o;op.textContent=typeof o==="object"?o.l:o;if(op.value===val)op.selected=true;s.appendChild(op);});
  s.addEventListener("change",e=>onChange(e.target.value));return s;
}
function lbl(txt){return el("span","lbl",[txt]);}
function card(children,extra){const d=div("card",Array.isArray(children)?children:[children]);if(extra)Object.assign(d.style,extra);return d;}
function stat(label,value,color){
  const d=div("stat-card");
  d.appendChild(div("lbl",[label]));
  const v=div("val",[String(value)]);v.style.color=color;d.appendChild(v);
  return d;
}
function exportXL(data,fn,hdr,keys){
  const ws=XLSX.utils.json_to_sheet(data.map(r=>Object.fromEntries(keys.map((k,i)=>[hdr[i],typeof r[k]==="object"?JSON.stringify(r[k]):r[k]]))));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"d");XLSX.writeFile(wb,fn+".xlsx");
}
function printW(html){
  const w=window.open("","_blank");if(!w)return;
  w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:-apple-system,'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:20px;color:#111;}h2,h3{text-align:center;}table{width:100%;border-collapse:collapse;margin:10px 0;}th,td{border:1px solid #ccc;padding:8px;text-align:right;font-size:13px;}th{background:#f5f5f5;}.ttl{font-weight:700;font-size:15px;margin-top:10px;}</style></head><body>${html}</body></html>`);
  w.document.close();w.print();
}
function sqC(q){return q===0?"#ef4444":q<=3?"#f59e0b":"#22c55e";}
function sqBg(q){return q===0?"rgba(239,68,68,.15)":q<=3?"rgba(245,158,11,.15)":"rgba(34,197,94,.15)";}

function invoiceHTML(r){
  const no=r.invoiceNum||r.saleId;
  return`<style>body{font-family:-apple-system,'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:28px;color:#111;max-width:580px;margin:auto;}.wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:60px;color:rgba(0,0,0,.055);font-weight:900;white-space:nowrap;pointer-events:none;}.hdr{text-align:center;border-bottom:2px solid #222;padding-bottom:12px;margin-bottom:16px;}.meta{display:flex;justify-content:space-between;margin-bottom:14px;font-size:13px;}.bl{text-align:right;}.bl span{color:#888;display:block;margin-bottom:2px;}.bl b{font-size:14px;}table{width:100%;border-collapse:collapse;margin:14px 0;}th,td{border:1px solid #ccc;padding:9px 11px;text-align:right;font-size:13px;}th{background:#f5f5f5;}.tot{margin-top:10px;font-size:15px;font-weight:700;border-top:2px solid #222;padding-top:8px;text-align:left;}.ftr{margin-top:18px;text-align:center;font-size:12px;color:#888;border-top:1px solid #eee;padding-top:10px;}</style>
<div class="wm">${STORE}</div>
<div class="hdr"><h2>🌿 ${STORE}</h2><p>فاتورة مبيعات — رقم: <b>#${no}</b></p></div>
<div class="meta">
<div class="bl"><span>التاريخ والوقت</span><b>${r.date} · ${r.time}</b><br><br><span>طريقة الدفع</span><b>${r.payType==="cash"?"نقداً 💵":r.payType==="debt"?"دين 📋":"بطاقة 💳"}</b></div>
<div class="bl"><span>اسم الزبون</span><b>${r.customer.name}</b>${r.customer.phone?`<br><br><span>رقم الهاتف</span><b>${r.customer.phone}</b>`:""}</div>
</div>
<table><thead><tr><th>المنتج</th><th>عدد القطع</th><th>سعر القطعة</th><th>المجموع</th></tr></thead>
<tbody><tr><td>${r.productName}${r.sku?" ("+r.sku+")":""}</td><td style="text-align:center">${r.qty}</td><td>$${(r.sellPrice||0).toFixed(2)}</td><td><b>$${r.total.toFixed(2)}</b></td></tr></tbody></table>
<div class="tot">المجموع الكلي: $${r.total.toFixed(2)}</div>
${r.customer.note?`<p style="margin-top:8px;font-size:13px;color:#666">ملاحظة: ${r.customer.note}</p>`:""}
<div class="ftr">شكراً لتعاملكم مع ${STORE} 🌿</div>`;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
async function sync(){
  up({saving:"جاري المزامنة..."});
  try{const r=await apiGet({action:"getAll"});if(r?.ok&&r.data){if(r.data.products?.length)sP(r.data.products);if(r.data.sales?.length)sSa(r.data.sales);if(r.data.notes)sNo(r.data.notes);}}catch{}
  up({saving:""});
}
async function addProduct(){
  const f=S.form;
  if(!f.name.trim()){set("fErr","أدخل اسم المنتج");return;}
  if(f.buyPrice===""||+f.buyPrice<0){set("fErr","أدخل سعر الشراء");return;}
  if(f.sellPrice===""||+f.sellPrice<0){set("fErr","أدخل سعر البيع");return;}
  if(f.quantity===""||+f.quantity<0){set("fErr","أدخل الكمية");return;}
  up({saving:"جاري الحفظ..."});
  const p={name:f.name.trim(),category:f.category,buyPrice:+f.buyPrice,sellPrice:+f.sellPrice,quantity:+f.quantity,sku:f.sku.trim(),image:f.image||"",addedBy:S.user.name,addedDate:today()};
  const res=await apiPost({action:"saveProduct",product:p});
  sP(prev=>[...prev,res?.ok&&res.data?res.data:{...p,id:Date.now()}]);
  up({form:{name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:"",image:""},fErr:"",page:"inventory",saving:""});
}
async function saveEdit(id){
  up({saving:"جاري الحفظ..."});
  const p={...S.editF,id,buyPrice:+S.editF.buyPrice,sellPrice:+S.editF.sellPrice,quantity:+S.editF.quantity};
  await apiPost({action:"updateProduct",product:p});
  sP(prev=>prev.map(x=>String(x.id)===String(id)?{...x,...p}:x));
  up({editId:null,saving:""});
}
async function delProduct(id){
  if(!confirm("حذف المنتج؟"))return;
  await apiPost({action:"deleteProduct",id});
  sP(prev=>prev.filter(p=>String(p.id)!==String(id)));render();
}
async function adjQty(id,d){
  const pr=S.products.find(p=>String(p.id)===String(id));if(!pr)return;
  const up2={...pr,quantity:Math.max(0,pr.quantity+d)};
  sP(prev=>prev.map(p=>String(p.id)===String(id)?up2:p));
  await apiPost({action:"updateProduct",product:up2});render();
}
async function confirmSale(){
  const pr=S.saleM,c=S.cust;
  if(!c.name.trim()){set("cErr","أدخل اسم الزبون");return;}
  up({saving:"جاري تسجيل البيع..."});
  const invN=getInvNum();
  const sale={saleId:Date.now(),invoiceNum:invN,productId:pr.id,productName:pr.name,category:pr.category,sku:pr.sku||"",qty:S.sQty,buyPrice:pr.buyPrice||0,sellPrice:pr.sellPrice||0,total:+((pr.sellPrice||0)*S.sQty).toFixed(2),profit:+((pr.sellPrice-pr.buyPrice)*S.sQty).toFixed(2),customer:c,payType:c.payType,soldBy:S.user.name,date:today(),time:new Date().toLocaleTimeString("ar-IQ",{hour:"2-digit",minute:"2-digit"})};
  const upPr={...pr,quantity:Math.max(0,pr.quantity-S.sQty)};
  await apiPost({action:"updateProduct",product:upPr});
  await apiPost({action:"saveSale",sale});
  sP(prev=>prev.map(p=>String(p.id)===String(pr.id)?upPr:p));
  sSa(prev=>[sale,...prev]);
  if(c.payType==="debt")sDe(prev=>[{id:Date.now()+1,customerName:c.name,phone:c.phone||"",amount:sale.total,note:"بيع: "+pr.name,date:today(),status:"unpaid"},...prev]);
  up({saleM:null,sQty:1,cust:{name:"",phone:"",note:"",payType:"cash"},cErr:"",printInv:sale,saving:""});
}
