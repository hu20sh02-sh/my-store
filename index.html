<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>متجر الفيب والشيشة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:#0f1117;color:#e8eaf0;min-height:100vh;-webkit-text-size-adjust:100%;}
input,select,textarea,button{font-family:inherit;font-size:16px;}
input:focus,select:focus,textarea:focus{outline:2px solid #6c63ff;}
.app{display:flex;min-height:100vh;}
.sidebar{width:190px;background:#13151f;border-left:1px solid #22253a;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform .25s;z-index:200;}
.main{flex:1;padding:1rem;overflow-y:auto;min-width:0;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;}
.overlay.on{display:block;}
.menu-btn{display:none;background:none;border:1px solid #2a2d3a;border-radius:8px;color:#e8eaf0;padding:7px 11px;font-size:20px;cursor:pointer;margin-left:8px;}
.card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:14px;padding:1rem;margin-bottom:.75rem;}
.inp{padding:10px 12px;border-radius:9px;border:1px solid #2a2d3a;background:#12151f;color:#e8eaf0;font-size:16px;width:100%;text-align:right;direction:rtl;}
.inp:disabled{opacity:.6;}
.btn{padding:9px 16px;border-radius:9px;border:1px solid #2a2d3a;background:transparent;color:#e8eaf0;cursor:pointer;font-size:14px;}
.btn-primary{background:#6c63ff;color:#fff;border:none;}
.btn-green{background:#22c55e;color:#fff;border:none;}
.btn-red{border-color:rgba(239,68,68,.3);color:#ef4444;}
.btn-amber{border-color:rgba(245,158,11,.3);color:#f59e0b;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat{background:#12151f;border:1px solid #2a2d3a;border-radius:12px;padding:.8rem 1rem;}
.stat .lbl{font-size:11px;color:#8b8fa8;margin-bottom:3px;}
.stat .val{font-size:15px;font-weight:700;}
.badge{font-size:11px;border-radius:6px;padding:2px 8px;font-weight:600;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem;}
.modal{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.prod-row{display:flex;align-items:stretch;flex-wrap:wrap;}
.lbl{font-size:12px;color:#8b8fa8;margin-bottom:4px;display:block;}
.nav-btn{display:block;width:100%;text-align:right;padding:9px 1rem;border:none;background:transparent;color:#8b8fa8;cursor:pointer;font-size:13px;border-right:3px solid transparent;}
.nav-btn.active{background:rgba(108,99,255,.15);color:#6c63ff;border-right:3px solid #6c63ff;font-weight:700;}
.sep{height:1px;background:#2a2d3a;margin:4px 0;}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tag{font-size:11px;background:#12151f;border:1px solid #2a2d3a;border-radius:5px;padding:2px 8px;color:#8b8fa8;}
.qty-box{font-size:20px;font-weight:700;border-radius:9px;padding:3px 13px;text-align:center;}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid #2a2d3a;background:transparent;cursor:pointer;font-size:18px;}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.top h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.saving{font-size:12px;color:#f59e0b;}
.notif{background:#ef4444;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-right:5px;}
.pending-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block;margin-right:4px;}
@media(max-width:680px){
  .sidebar{position:fixed!important;right:0;top:0;height:100vh!important;transform:translateX(100%);}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:inline-flex!important;}
  .hide-m{display:none!important;}
  .grid2{grid-template-columns:1fr!important;}
  .stat-grid{grid-template-columns:1fr 1fr!important;}
  .prod-row{flex-direction:column;}
  .prod-prices{flex-direction:row!important;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API="https://script.google.com/macros/s/AKfycbwgpvKIS5nK3j8c1ATj7OalqvAiij9mxjP9KrT-kSUBnuhG0rQFnlc-zheqQumei2BR/exec";
const STORE="متجر الفيب والشيشة";
const CATS=["جهاز فيب","سائل إلكتروني","شيشة","معسل","فحم","إكسسوارات","أخرى"];
const EXP_CATS=["عام","إيجار","رواتب","كهرباء","مياه","إنترنت","صيانة","نقل","أخرى"];
const ROLES={
  admin:{label:"مدير",color:"#6c63ff",p:["dashboard","inventory","addProduct","sales","dailyReport","debts","suppliers","expenses","returns","purchases","reports","accounts","notes","users","backup"]},
  accountant:{label:"محاسب",color:"#22c55e",p:["dashboard","accounts","reports","sales","dailyReport","expenses"]},
  warehouse:{label:"موظف مخزن",color:"#f59e0b",p:["dashboard","inventory","addProduct","returns"]},
  staff:{label:"موظف",color:"#8b8fa8",p:["dashboard","inventory","sales"]},
};
const PAGES=[
  {k:"dashboard",l:"🏠 الرئيسية"},{k:"inventory",l:"📦 المخزن"},{k:"addProduct",l:"➕ إضافة مادة"},
  {k:"sales",l:"📊 سجل المبيعات"},{k:"dailyReport",l:"📅 تقرير يومي"},{k:"debts",l:"💳 الديون"},
  {k:"suppliers",l:"🏭 الموردون"},{k:"expenses",l:"💸 المصروفات"},{k:"returns",l:"↩️ الطلبات الراجعة"},
  {k:"purchases",l:"🛒 قائمة الشراء"},{k:"reports",l:"📈 التقارير"},{k:"accounts",l:"💰 الحسابات"},
  {k:"notes",l:"📝 ملاحظات"},{k:"users",l:"👥 المستخدمون"},{k:"backup",l:"💾 النسخ الاحتياطي"},
];
const DADMIN={id:"1",name:"المدير",phone:"07700000000",password:"admin123",role:"admin",status:"approved",perms:ROLES.admin.p};

// ── تخزين محلي ──────────────────────────────────────────
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getInvNum(){const n=ls("vape_inv",1000)+1;ss("vape_inv",n);return n;}

// ── API ──────────────────────────────────────────────────
async function apiGet(p){try{const r=await fetch(API+"?"+new URLSearchParams(p));return r.json();}catch{return{ok:false};}}
async function apiPost(b){try{const r=await fetch(API,{method:"POST",body:JSON.stringify(b)});return r.json();}catch{return{ok:false};}}

// ── الحالة العامة ────────────────────────────────────────
const ST={
  user:ls("vape_session",null),
  screen:ls("vape_session",null)?"main":"login",
  page:"dashboard",
  sideOpen:false,
  saving:"",
  products:ls("vape_products",[]),
  sales:ls("vape_sales",[]),
  notes:ls("vape_notes",""),
  debts:ls("vape_debts",[]),
  suppliers:ls("vape_suppliers",[]),
  expenses:ls("vape_expenses",[]),
  returns:ls("vape_returns",[]),
  pos:ls("vape_po",[]),
  users:ls("vape_users",[DADMIN]),
  search:"",fCat:"الكل",
  editId:null,editF:{},
  form:{name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:"",image:""},
  fErr:"",
  saleModal:null,sQty:1,
  cust:{name:"",phone:"",note:"",payType:"cash"},cErr:"",
  sSrch:"",expSale:null,
  po:{supplierName:"",date:today(),notes:"",discount:"0",items:[{name:"",qty:"1",price:""}]},
  printInv:null,
  dDay:today(),
  // forms
  dForm:{customerName:"",phone:"",amount:"",note:"",date:today(),status:"unpaid"},
  suForm:{name:"",phone:"",address:"",notes:""},
  exForm:{title:"",amount:"",category:"عام",date:today(),notes:""},
  rtForm:{productName:"",qty:"1",reason:"",date:today(),customerName:"",refundAmount:"",status:"pending"},
  // users page
  userTab:"list",editUser:null,
  loginPhone:"",loginPass:"",loginShow:false,loginErr:"",
  regName:"",regPhone:"",regRole:"staff",regPass:"",regPass2:"",regErr:"",regOk:false,
};

function today(){return new Date().toLocaleDateString("ar-IQ");}

// ── التحديث والرسم ──────────────────────────────────────
function set(key,val){ST[key]=val;render();}
function merge(obj){Object.assign(ST,obj);render();}
function sP(v){const d=typeof v==="function"?v(ST.products):v;ST.products=d;ss("vape_products",d);}
function sSa(v){const d=typeof v==="function"?v(ST.sales):v;ST.sales=d;ss("vape_sales",d);}
function sNo(v){ST.notes=v;ss("vape_notes",v);}
function sDe(v){const d=typeof v==="function"?v(ST.debts):v;ST.debts=d;ss("vape_debts",d);}
function sSu(v){const d=typeof v==="function"?v(ST.suppliers):v;ST.suppliers=d;ss("vape_suppliers",d);}
function sEx(v){const d=typeof v==="function"?v(ST.expenses):v;ST.expenses=d;ss("vape_expenses",d);}
function sRe(v){const d=typeof v==="function"?v(ST.returns):v;ST.returns=d;ss("vape_returns",d);}
function sPO(v){const d=typeof v==="function"?v(ST.pos):v;ST.pos=d;ss("vape_po",d);}
function sUs(v){const d=typeof v==="function"?v(ST.users):v;ST.users=d;ss("vape_users",d);}

function login(u){ST.user=u;ST.screen="main";ss("vape_session",u);render();}
function logout(){ST.user=null;ST.screen="login";localStorage.removeItem("vape_session");render();}
const can=p=>ST.user?.perms?.includes(p);
const isA=()=>ST.user?.role==="admin";

async function syncData(){
  merge({saving:"جاري المزامنة..."});
  try{
    const r=await apiGet({action:"getAll"});
    if(r?.ok&&r.data){
      if(r.data.products?.length){sP(r.data.products);}
      if(r.data.sales?.length){sSa(r.data.sales);}
      if(r.data.notes){sNo(r.data.notes);}
    }
  }catch{}
  merge({saving:""});
}

async function addProduct(){
  const f=ST.form;
  if(!f.name.trim()){set("fErr","أدخل اسم المنتج");return;}
  if(f.buyPrice===""||+f.buyPrice<0){set("fErr","أدخل سعر الشراء");return;}
  if(f.sellPrice===""||+f.sellPrice<0){set("fErr","أدخل سعر البيع");return;}
  if(f.quantity===""||+f.quantity<0){set("fErr","أدخل الكمية");return;}
  merge({saving:"جاري الحفظ..."});
  const p={name:f.name.trim(),category:f.category,buyPrice:+f.buyPrice,sellPrice:+f.sellPrice,quantity:+f.quantity,sku:f.sku.trim(),image:f.image||"",addedBy:ST.user.name,addedDate:today()};
  const res=await apiPost({action:"saveProduct",product:p});
  const saved=res?.ok&&res.data?res.data:{...p,id:Date.now()};
  sP(prev=>[...prev,saved]);
  merge({form:{name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:"",image:""},fErr:"",page:"inventory",saving:""});
}

async function saveEdit(id){
  merge({saving:"جاري الحفظ..."});
  const p={...ST.editF,id,buyPrice:+ST.editF.buyPrice,sellPrice:+ST.editF.sellPrice,quantity:+ST.editF.quantity};
  await apiPost({action:"updateProduct",product:p});
  sP(prev=>prev.map(x=>String(x.id)===String(id)?{...x,...p}:x));
  merge({editId:null,saving:""});
}

async function delProduct(id){
  if(!confirm("حذف المنتج؟"))return;
  await apiPost({action:"deleteProduct",id});
  sP(prev=>prev.filter(p=>String(p.id)!==String(id)));render();
}

async function adjQty(id,d){
  const pr=ST.products.find(p=>String(p.id)===String(id));if(!pr)return;
  const up={...pr,quantity:Math.max(0,pr.quantity+d)};
  sP(prev=>prev.map(p=>String(p.id)===String(id)?up:p));
  await apiPost({action:"updateProduct",product:up});
  render();
}

async function confirmSale(){
  const pr=ST.saleModal,c=ST.cust;
  if(!c.name.trim()){set("cErr","أدخل اسم الزبون");return;}
  merge({saving:"جاري تسجيل البيع..."});
  const invN=getInvNum();
  const sale={saleId:Date.now(),invoiceNum:invN,productId:pr.id,productName:pr.name,category:pr.category,sku:pr.sku||"",qty:ST.sQty,buyPrice:pr.buyPrice||0,sellPrice:pr.sellPrice||0,total:+((pr.sellPrice||0)*ST.sQty).toFixed(2),profit:+((pr.sellPrice-pr.buyPrice)*ST.sQty).toFixed(2),customer:c,payType:c.payType,soldBy:ST.user.name,date:today(),time:new Date().toLocaleTimeString("ar-IQ",{hour:"2-digit",minute:"2-digit"})};
  const up={...pr,quantity:Math.max(0,pr.quantity-ST.sQty)};
  await apiPost({action:"updateProduct",product:up});
  await apiPost({action:"saveSale",sale});
  sP(prev=>prev.map(p=>String(p.id)===String(pr.id)?up:p));
  sSa(prev=>[sale,...prev]);
  if(c.payType==="debt")sDe(prev=>[{id:Date.now()+1,customerName:c.name,phone:c.phone||"",amount:sale.total,note:"بيع: "+pr.name,date:today(),status:"unpaid"},...prev]);
  merge({saleModal:null,sQty:1,cust:{name:"",phone:"",note:"",payType:"cash"},cErr:"",printInv:sale,saving:""});
}

async function delSale(id){
  if(!confirm("حذف السجل؟"))return;
  await apiPost({action:"deleteSale",saleId:id});
  sSa(prev=>prev.filter(s=>String(s.saleId)!==String(id)));render();
}

function doBackup(){
  const d={products:ST.products,sales:ST.sales,debts:ST.debts,suppliers:ST.suppliers,expenses:ST.expenses,returns:ST.returns,pos:ST.pos,notes:ST.notes,date:new Date().toLocaleString("ar-IQ")};
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));
  a.download="backup_"+today().replace(/\//g,"-")+".json";a.click();
}
function doRestore(file){
  const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.products)sP(d.products);if(d.sales)sSa(d.sales);if(d.debts)sDe(d.debts);if(d.suppliers)sSu(d.suppliers);if(d.expenses)sEx(d.expenses);if(d.returns)sRe(d.returns);if(d.pos)sPO(d.pos);if(d.notes)sNo(d.notes);alert("✅ تم الاستعادة!");render();}catch{alert("❌ ملف غير صحيح");}};r.readAsText(file);
}
function storSz(){let t=0;["vape_products","vape_sales","vape_debts","vape_suppliers","vape_expenses","vape_returns","vape_po","vape_notes"].forEach(k=>{t+=(localStorage.getItem(k)||"").length;});return(t/1024).toFixed(1);}
function exportXL(data,fn,hdr,keys){
  const ws=XLSX.utils.json_to_sheet(data.map(r=>Object.fromEntries(keys.map((k,i)=>[hdr[i],typeof r[k]==="object"?JSON.stringify(r[k]):r[k]]))));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"data");XLSX.writeFile(wb,fn+".xlsx");
}
function printW(html){const w=window.open("","_blank");w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:20px;color:#111;}h2,h3{text-align:center;}table{width:100%;border-collapse:collapse;margin:10px 0;}th,td{border:1px solid #ccc;padding:8px;text-align:right;font-size:13px;}th{background:#f5f5f5;}.ttl{font-weight:700;font-size:15px;margin-top:10px;}</style></head><body>${html}</body></html>`);w.document.close();w.print();}

function invoiceHTML(sale){
  const no=sale.invoiceNum||sale.saleId;
  return`<style>body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:28px;color:#111;max-width:580px;margin:auto;}.wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:64px;color:rgba(0,0,0,.055);font-weight:900;white-space:nowrap;pointer-events:none;}.hdr{text-align:center;border-bottom:2px solid #222;padding-bottom:12px;margin-bottom:16px;}.hdr h1{font-size:22px;margin-bottom:4px;}.meta{display:flex;justify-content:space-between;margin-bottom:14px;font-size:13px;}.bl{text-align:right;}.bl span{color:#888;display:block;margin-bottom:2px;}.bl b{font-size:14px;}table{width:100%;border-collapse:collapse;margin:14px 0;}th,td{border:1px solid #ccc;padding:9px 11px;text-align:right;font-size:13px;}th{background:#f5f5f5;font-weight:700;}.tot{margin-top:10px;text-align:left;font-size:15px;font-weight:700;border-top:2px solid #222;padding-top:8px;}.ftr{margin-top:18px;text-align:center;font-size:12px;color:#888;border-top:1px solid #eee;padding-top:10px;}</style>
<div class="wm">${STORE}</div>
<div class="hdr"><h1>🌿 ${STORE}</h1><p>فاتورة مبيعات — رقم: <b>#${no}</b></p></div>
<div class="meta">
<div class="bl"><span>التاريخ والوقت</span><b>${sale.date} · ${sale.time}</b><br/><br/><span>طريقة الدفع</span><b>${sale.payType==="cash"?"نقداً 💵":sale.payType==="debt"?"دين 📋":"بطاقة 💳"}</b></div>
<div class="bl"><span>اسم الزبون</span><b>${sale.customer.name}</b>${sale.customer.phone?`<br/><br/><span>رقم الهاتف</span><b>${sale.customer.phone}</b>`:""}</div>
</div>
<table><thead><tr><th>المنتج</th><th>عدد القطع</th><th>سعر القطعة</th><th>المجموع</th></tr></thead>
<tbody><tr><td>${sale.productName}${sale.sku?" ("+sale.sku+")":""}</td><td style="text-align:center">${sale.qty}</td><td>$${(sale.sellPrice||0).toFixed(2)}</td><td><b>$${sale.total.toFixed(2)}</b></td></tr></tbody></table>
<div class="tot">المجموع الكلي: $${sale.total.toFixed(2)}</div>
${sale.customer.note?`<p style="margin-top:8px;font-size:13px;color:#666">ملاحظة: ${sale.customer.note}</p>`:""}
<div class="ftr">شكراً لتعاملكم مع ${STORE} 🌿</div>`;
}

function sqC(q){return q===0?"#ef4444":q<=3?"#f59e0b":"#22c55e";}
function sqBg(q){return q===0?"rgba(239,68,68,.15)":q<=3?"rgba(245,158,11,.15)":"rgba(34,197,94,.15)";}

// ── مساعدات HTML ─────────────────────────────────────────
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class")el.className=v;
    else if(k==="style")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false||c===undefined)return;
      el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  return el;
}
function div(attrs,children){return h("div",attrs,children);}
function btn(text,cls,onClick,extraStyle){
  const b=h("button",{class:"btn "+(cls||""),style:extraStyle||{}},text);
  if(onClick)b.addEventListener("click",onClick);
  return b;
}
function inp(val,onChange,placeholder,type,extraStyle){
  const el=h("input",{class:"inp",type:type||"text",placeholder:placeholder||"",style:extraStyle||{}});
  el.value=val||"";
  el.addEventListener("input",e=>onChange(e.target.value));
  return el;
}
function sel(val,options,onChange,extraStyle){
  const el=h("select",{class:"inp",style:extraStyle||{}});
  options.forEach(o=>{
    const op=document.createElement("option");
    op.value=typeof o==="object"?o.v:o;
    op.textContent=typeof o==="object"?o.l:o;
    if((typeof o==="object"?o.v:o)===val)op.selected=true;
    el.appendChild(op);
  });
  el.addEventListener("change",e=>onChange(e.target.value));
  return el;
}
function lbl(text){return h("span",{class:"lbl"},text);}
function card(children,extraStyle){return div({class:"card",style:extraStyle||{}},[children].flat());}
function statBox(label,value,color){return div({class:"stat"},[div({class:"lbl"},label),div({class:"val",style:{color}},String(value))]);}
function textInput(label,val,onChange,placeholder,type){return div({},[lbl(label),inp(val,onChange,placeholder,type)]);}

// ══════════════════════════════════════════════════════════
// ── الصفحات ───────────────────────────────────────────────
// ══════════════════════════════════════════════════════════

function pageDashboard(){
  const p=ST.products,s=ST.sales;
  const tInv=p.reduce((a,x)=>a+(x.sellPrice||0)*x.quantity,0);
  const tCost=p.reduce((a,x)=>a+(x.buyPrice||0)*x.quantity,0);
  const tUnits=p.reduce((a,x)=>a+x.quantity,0);
  const tRev=s.reduce((a,x)=>a+x.total,0);
  const tPro=s.reduce((a,x)=>a+(x.profit||0),0);
  const tDebt=ST.debts.filter(d=>d.status==="unpaid").reduce((a,x)=>a+(+x.amount||0),0);
  const tExp=ST.expenses.reduce((a,x)=>a+(+x.amount||0),0);

    box.append(header,div({style:{marginBottom:"4px"}},div({style:{fontSize:"12px",color:"#8b8fa8",marginBottom:"5px"}},"📱 رقم الهاتف")),phInp,div({style:{marginBottom:"4px"}},div({style:{fontSize:"12px",color:"#8b8fa8",marginBottom:"5px"}},"🔒 كلمة المرور")),paWrap,errDiv,loginBtn,regBtn,hint);

        if(ST.users.find(u=>u.phone===ST.regPhone.trim())){ST.regErr="رقم الهاتف مسجل مسبقاً";renderAuth();return;}

      div({style:{fontSize:"11px",color:"#8b8fa8",marginTop:"3px"}},ST.user.name),

    ]),

      MENU.map(m=>{

        if(m.k==="users"&&pending.length>0){const dot=h("span",{class:"pending-dot"});b.insertBefore(dot,b.firstChild);}

  ov.addEventListener("click",()=>set("sideOpen",false));

  // المحتوى
  const pageMap={dashboard:pageDashboard,inventory:pageInventory,addProduct:pageAddProduct,sales:pageSales,dailyReport:pageDailyReport,debts:pageDebts,suppliers:pageSuppliers,expenses:pageExpenses,returns:pageReturns,purchases:pagePurchases,reports:pageReports,accounts:pageAccounts,notes:pageNotes,users:pageUsers,backup:pageBackup};
  const pageContent=(pageMap[ST.page]||pageDashboard)();

        h("h2",{style:{fontSize:"16px",fontWeight:"700"}},currentLabel),

    const ntInp=h("input",{class:"inp",placeholder:"نقداً / دين..."});ntInp.value=ST.cust.note;ntInp.addEventListener("input",e=>ST.cust.note=e.target.value);
    saleModalEl=div({class:"modal-bg"},[

        div({class:"flex"},[

        ]),
      ].filter(Boolean)),

  }

  // نافذة الفاتورة

          btn("تخطي","",()=>set("printInv",null),{flex:"1",color:"#8b8fa8",padding:"10px"}),

  const wrap=div({class:"app"},[ov,sidebar,main]);
  app.appendChild(wrap);

  // زر القائمة
  const mb=document.getElementById("menu-btn");
  if(mb)mb.addEventListener("click",()=>set("sideOpen",!ST.sideOpen));
}

// ── التشغيل ──────────────────────────────────────────────

if(ST.screen==="main")syncData();
</script>
