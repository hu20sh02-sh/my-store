<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>متجر الفيب والشيشة</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#444;border-radius:3px;}
input,select,textarea,button{font-family:inherit;font-size:16px;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{outline:2px solid #6c63ff;}
@media(max-width:700px){
  .sidebar{display:none!important;}
  .sidebar.open{display:flex!important;position:fixed!important;z-index:500!important;width:220px!important;height:100vh!important;top:0!important;right:0!important;}
  .main-content{padding:0.75rem 0.6rem!important;}
  .stats-grid{grid-template-columns:repeat(2,1fr)!important;}
  .product-card-row{flex-direction:column!important;}
  .product-prices{flex-direction:row!important;border-left:none!important;border-top:1px solid var(--border)!important;}
  .sale-modal{padding:1rem!important;}
  .grid-2{grid-template-columns:1fr!important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

const API="https://script.google.com/macros/s/AKfycbwgpvKIS5nK3j8c1ATj7OalqvAiij9mxjP9KrT-kSUBnuhG0rQFnlc-zheqQumei2BR/exec";
const STORE_NAME="متجر الفيب والشيشة";
const CATS=["جهاز فيب","سائل إلكتروني","شيشة","معسل","فحم","إكسسوارات","أخرى"];

const ROLES={
  admin:{label:"مدير",color:"#6c63ff",defaultPerms:["dashboard","inventory","addProduct","sales","purchases","reports","accounts","notes","users","debts","suppliers","expenses","returns","dailyReport"]},
  accountant:{label:"محاسب",color:"#22c55e",defaultPerms:["dashboard","accounts","reports","sales","dailyReport","expenses"]},
  warehouse:{label:"موظف مخزن",color:"#f59e0b",defaultPerms:["dashboard","inventory","addProduct","returns"]},
  staff:{label:"موظف",color:"#8b8fa8",defaultPerms:["dashboard","inventory","sales"]},
};

const ALL_PAGES=[
  {k:"dashboard",l:"🏠 الرئيسية"},
  {k:"inventory",l:"📦 المخزن"},
  {k:"addProduct",l:"➕ إضافة مادة"},
  {k:"sales",l:"📊 سجل المبيعات"},
  {k:"dailyReport",l:"📅 تقرير يومي"},
  {k:"debts",l:"💳 الديون"},
  {k:"suppliers",l:"🏭 الموردون"},
  {k:"expenses",l:"💸 المصروفات"},
  {k:"returns",l:"↩️ الطلبات الراجعة"},
  {k:"purchases",l:"🛒 قائمة الشراء"},
  {k:"reports",l:"📈 التقارير"},
  {k:"accounts",l:"💰 الحسابات"},
  {k:"notes",l:"📝 ملاحظات"},
  {k:"users",l:"👥 المستخدمون"},
  {k:"backup",l:"💾 النسخ الاحتياطي"},
];

const DEFAULT_ADMIN={id:"1",name:"المدير",phone:"07700000000",password:"admin123",role:"admin",status:"approved",perms:ROLES.admin.defaultPerms};

// ── حفظ واسترجاع محلي ──────────────────────────────────
function ls(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}}
function ss(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

function getUsers(){return ls("vape_users",[DEFAULT_ADMIN]);}
function saveUsers(u){ss("vape_users",u);}

let INVOICE_COUNTER=parseInt(localStorage.getItem("vape_inv_counter")||"1000");
function nextInvoiceNum(){INVOICE_COUNTER++;localStorage.setItem("vape_inv_counter",INVOICE_COUNTER);return INVOICE_COUNTER;}

const THEMES={
  dark:{name:"🌙 داكن",bg:"#0f1117",card:"#1a1d27",border:"#2a2d3a",text:"#e8eaf0",sub:"#8b8fa8",accent:"#6c63ff",accentText:"#fff",green:"#22c55e",greenBg:"rgba(34,197,94,0.12)",red:"#ef4444",redBg:"rgba(239,68,68,0.12)",amber:"#f59e0b",amberBg:"rgba(245,158,11,0.12)",input:"#12151f",statBg:"#12151f",sidebar:"#13151f",sidebarBorder:"#22253a",sellBtn:"#22c55e",sellBtnTxt:"#fff"},
  light:{name:"☀️ فاتح",bg:"#f4f6fb",card:"#ffffff",border:"#dde2f0",text:"#1a1d2e",sub:"#6b7280",accent:"#4f46e5",accentText:"#fff",green:"#16a34a",greenBg:"#dcfce7",red:"#dc2626",redBg:"#fee2e2",amber:"#b45309",amberBg:"#fef3c7",input:"#f9fafb",statBg:"#eef1f8",sidebar:"#ffffff",sidebarBorder:"#dde2f0",sellBtn:"#16a34a",sellBtnTxt:"#fff"},
  gold:{name:"✨ ذهبي",bg:"#1a1400",card:"#221c00",border:"#3d3200",text:"#ffe98a",sub:"#9e8c4a",accent:"#f5c518",accentText:"#000",green:"#a3e635",greenBg:"rgba(163,230,53,0.12)",red:"#f87171",redBg:"rgba(248,113,113,0.12)",amber:"#fb923c",amberBg:"rgba(251,146,60,0.12)",input:"#120f00",statBg:"#120f00",sidebar:"#120f00",sidebarBorder:"#3d3200",sellBtn:"#f5c518",sellBtnTxt:"#000"},
};

async function api(p){try{const r=await fetch(API+"?"+new URLSearchParams(p));return r.json();}catch{return{ok:false};}}
async function apiPost(b){try{const r=await fetch(API,{method:"POST",body:JSON.stringify(b)});return r.json();}catch{return{ok:false};}}

const emptyForm={name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:"",image:""};
const emptyCust={name:"",phone:"",note:"",payType:"cash"};
const emptyPO={supplierName:"",date:new Date().toLocaleDateString("ar-IQ"),notes:"",discount:"0",items:[{name:"",qty:"1",price:""}]};
const emptyDebt={customerName:"",phone:"",amount:"",note:"",date:new Date().toLocaleDateString("ar-IQ"),status:"unpaid"};
const emptySupplier={name:"",phone:"",address:"",notes:""};
const emptyExpense={title:"",amount:"",category:"عام",date:new Date().toLocaleDateString("ar-IQ"),notes:""};
const emptyReturn={productName:"",qty:"1",reason:"",date:new Date().toLocaleDateString("ar-IQ"),customerName:"",refundAmount:"",status:"pending"};
const EXPENSE_CATS=["عام","إيجار","رواتب","كهرباء","مياه","إنترنت","صيانة","نقل","أخرى"];

function App(){
  const[user,setUser]=useState(()=>ls("vape_session",null));
  const[screen,setScreen]=useState(()=>ls("vape_session",null)?"main":"login");
  const[themeName,setThemeName]=useState(()=>localStorage.getItem("vape_theme")||"dark");
  // البيانات — تُحفظ محلياً دائماً
  const[products,setProductsRaw]=useState(()=>ls("vape_products",[]));
  const[sales,setSalesRaw]=useState(()=>ls("vape_sales",[]));
  const[notes,setNotesRaw]=useState(()=>ls("vape_notes",""));
  const[debts,setDebtsRaw]=useState(()=>ls("vape_debts",[]));
  const[suppliers,setSuppliersRaw]=useState(()=>ls("vape_suppliers",[]));
  const[expenses,setExpensesRaw]=useState(()=>ls("vape_expenses",[]));
  const[returns,setReturnsRaw]=useState(()=>ls("vape_returns",[]));
  const[purchaseOrders,setPORaw]=useState(()=>ls("vape_po",[]));
  const[users,setUsersRaw]=useState(getUsers);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const isMobile=typeof window!=="undefined"&&window.innerWidth<=700;
  const[saving,setSaving]=useState("");
  const[page,setPage]=useState("dashboard");
  const[search,setSearch]=useState("");
  const[filterCat,setFilterCat]=useState("الكل");
  const[editId,setEditId]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[form,setForm]=useState(emptyForm);
  const[formErr,setFormErr]=useState("");
  const[saleModal,setSaleModal]=useState(null);
  const[saleQty,setSaleQty]=useState(1);
  const[cust,setCust]=useState(emptyCust);
  const[custErr,setCustErr]=useState("");
  const[salesSearch,setSalesSearch]=useState("");
  const[expandedSale,setExpandedSale]=useState(null);
  const[po,setPo]=useState(emptyPO);
  const[printInvoice,setPrintInvoice]=useState(null);
  const[debtForm,setDebtForm]=useState(emptyDebt);
  const[supplierForm,setSupplierForm]=useState(emptySupplier);
  const[expenseForm,setExpenseForm]=useState(emptyExpense);
  const[returnForm,setReturnForm]=useState(emptyReturn);
  const[dailyDate,setDailyDate]=useState(new Date().toLocaleDateString("ar-IQ"));
  const T=THEMES[themeName];

  // ── وظائف حفظ مع localStorage ──────────────────────
  function setProducts(v){const d=typeof v==="function"?v(products):v;setProductsRaw(d);ss("vape_products",d);}
  function setSales(v){const d=typeof v==="function"?v(sales):v;setSalesRaw(d);ss("vape_sales",d);}
  function setNotes(v){setNotesRaw(v);ss("vape_notes",v);}
  function setDebts(v){const d=typeof v==="function"?v(debts):v;setDebtsRaw(d);ss("vape_debts",d);}
  function setSuppliers(v){const d=typeof v==="function"?v(suppliers):v;setSuppliersRaw(d);ss("vape_suppliers",d);}
  function setExpenses(v){const d=typeof v==="function"?v(expenses):v;setExpensesRaw(d);ss("vape_expenses",d);}
  function setReturns(v){const d=typeof v==="function"?v(returns):v;setReturnsRaw(d);ss("vape_returns",d);}
  function setPurchaseOrders(v){const d=typeof v==="function"?v(purchaseOrders):v;setPORaw(d);ss("vape_po",d);}
  function setUsers(v){const d=typeof v==="function"?v(users):v;setUsersRaw(d);saveUsers(d);}

  useEffect(()=>{localStorage.setItem("vape_theme",themeName);},[themeName]);

  // مزامنة مع Google Sheets عند الدخول
  const syncFromAPI=useCallback(async()=>{
    setLoading(true);setSaving("جاري المزامنة...");
    try{
      const res=await api({action:"getAll"});
      if(res&&res.ok&&res.data){
        if(res.data.products?.length){setProducts(res.data.products);}
        if(res.data.sales?.length){setSales(res.data.sales);}
        if(res.data.notes){setNotes(res.data.notes);}
      }
    }catch{}
    setLoading(false);setSaving("");
  },[]);

  useEffect(()=>{if(user)syncFromAPI();},[user]);

  const can=(p)=>user?.perms?.includes(p);
  const isAdmin=user?.role==="admin";

  function login(u){setUser(u);ss("vape_session",u);setScreen("main");}
  function logout(){setUser(null);localStorage.removeItem("vape_session");setScreen("login");setPage("dashboard");}
  function refreshUser(u){setUser(u);ss("vape_session",u);}

  // ── قراءة الصورة ───────────────────────────────────
  function readImage(file,cb){
    const r=new FileReader();
    r.onload=e=>cb(e.target.result);
    r.readAsDataURL(file);
  }

  // ── إضافة منتج ──────────────────────────────────────
  async function handleAdd(){
    if(!form.name.trim()){setFormErr("يرجى إدخال اسم المنتج");return;}
    if(form.buyPrice===""||+form.buyPrice<0){setFormErr("يرجى إدخال سعر الشراء");return;}
    if(form.sellPrice===""||+form.sellPrice<0){setFormErr("يرجى إدخال سعر البيع");return;}
    if(form.quantity===""||+form.quantity<0){setFormErr("يرجى إدخال الكمية");return;}
    setSaving("جاري الحفظ...");
    const p={name:form.name.trim(),category:form.category,buyPrice:parseFloat(form.buyPrice),sellPrice:parseFloat(form.sellPrice),quantity:parseInt(form.quantity),sku:form.sku.trim(),image:form.image||"",addedBy:user.name,addedDate:new Date().toLocaleDateString("ar-IQ")};
    const res=await apiPost({action:"saveProduct",product:p});
    const saved=res?.ok&&res.data?res.data:{...p,id:Date.now()};
    setProducts(prev=>[...prev,saved]);
    setForm(emptyForm);setFormErr("");setPage("inventory");
    setSaving("");
  }

  async function saveEdit(id){
    setSaving("جاري الحفظ...");
    const p={...editForm,id,buyPrice:parseFloat(editForm.buyPrice),sellPrice:parseFloat(editForm.sellPrice),quantity:parseInt(editForm.quantity)};
    await apiPost({action:"updateProduct",product:p});
    setProducts(prev=>prev.map(x=>String(x.id)===String(id)?{...x,...p}:x));
    setEditId(null);setSaving("");
  }

  async function deleteProduct(id){
    if(!confirm("حذف المنتج؟"))return;
    await apiPost({action:"deleteProduct",id});
    setProducts(prev=>prev.filter(p=>String(p.id)!==String(id)));
  }

  async function adjustQty(id,d){
    const prod=products.find(p=>String(p.id)===String(id));if(!prod)return;
    const updated={...prod,quantity:Math.max(0,prod.quantity+d)};
    setProducts(prev=>prev.map(p=>String(p.id)===String(id)?updated:p));
    await apiPost({action:"updateProduct",product:updated});
  }

  async function confirmSale(){
    if(!cust.name.trim()){setCustErr("يرجى إدخال اسم الزبون");return;}
    setSaving("جاري تسجيل البيع...");
    const prod=saleModal;
    const unitCost=prod.buyPrice||0;
    const unitSell=prod.sellPrice||0;
    const invNum=nextInvoiceNum();
    const sale={saleId:Date.now(),invoiceNum:invNum,productId:prod.id,productName:prod.name,category:prod.category,sku:prod.sku||"",qty:saleQty,buyPrice:unitCost,sellPrice:unitSell,unitProfit:+(unitSell-unitCost).toFixed(2),total:+(unitSell*saleQty).toFixed(2),totalCost:+(unitCost*saleQty).toFixed(2),profit:+((unitSell-unitCost)*saleQty).toFixed(2),customer:cust,payType:cust.payType,soldBy:user.name,date:new Date().toLocaleDateString("ar-IQ"),time:new Date().toLocaleTimeString("ar-IQ",{hour:"2-digit",minute:"2-digit"})};
    const updatedProd={...prod,quantity:Math.max(0,prod.quantity-saleQty)};
    await apiPost({action:"updateProduct",product:updatedProd});
    await apiPost({action:"saveSale",sale});
    setProducts(prev=>prev.map(p=>String(p.id)===String(prod.id)?updatedProd:p));
    setSales(prev=>[sale,...prev]);
    // إذا دين أضفه تلقائياً
    if(cust.payType==="debt"){
      const d={id:Date.now()+1,customerName:cust.name,phone:cust.phone||"",amount:sale.total,note:"من بيع: "+prod.name,date:sale.date,status:"unpaid"};
      setDebts(prev=>[d,...prev]);
    }
    setSaleModal(null);setSaleQty(1);setCust(emptyCust);setCustErr("");
    setPrintInvoice(sale);setSaving("");
  }

  async function deleteSale(saleId){
    if(!confirm("حذف السجل؟"))return;
    await apiPost({action:"deleteSale",saleId});
    setSales(prev=>prev.filter(s=>String(s.saleId)!==String(saleId)));
  }

  async function handleSaveNotes(){
    setSaving("جاري الحفظ...");
    await apiPost({action:"saveNotes",notes});
    setSaving("تم ✓");setTimeout(()=>setSaving(""),2000);
  }

  // ── تصدير ──────────────────────────────────────────
  function exportExcel(data,filename,headers,keys){
    const ws=XLSX.utils.json_to_sheet(data.map(r=>Object.fromEntries(keys.map((k,i)=>[headers[i],typeof r[k]==="object"?JSON.stringify(r[k]):r[k]]))));
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"data");
    XLSX.writeFile(wb,filename+".xlsx");
  }

  function printHTML(html){
    const w=window.open("","_blank");
    w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:24px;color:#111;}h2,h3{text-align:center;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:8px;text-align:right;font-size:13px;}th{background:#f0f0f0;}.ttl{font-weight:700;font-size:15px;margin-top:10px;}</style></head><body>${html}</body></html>`);
    w.document.close();w.print();
  }

  function invoiceHTML(sale){
    const invNo=sale.invoiceNum||sale.saleId;
    return`
<style>
.inv-wrap{position:relative;font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:32px;max-width:600px;margin:auto;color:#111;}
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:72px;color:rgba(0,0,0,0.06);font-weight:900;white-space:nowrap;pointer-events:none;z-index:0;}
.inv-content{position:relative;z-index:1;}
.inv-header{text-align:center;margin-bottom:18px;border-bottom:2px solid #333;padding-bottom:12px;}
.inv-header h1{font-size:26px;margin:0 0 4px;}
.inv-header p{margin:2px 0;font-size:13px;color:#555;}
.inv-meta{display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;}
.inv-meta .block{text-align:right;}
.inv-meta .block b{display:block;font-size:15px;}
table{width:100%;border-collapse:collapse;margin:16px 0;}
th,td{border:1px solid #ccc;padding:9px 12px;text-align:right;font-size:13px;}
th{background:#f5f5f5;font-weight:700;}
.totals{margin-top:12px;text-align:left;font-size:14px;}
.totals div{margin-bottom:4px;}
.totals .grand{font-size:17px;font-weight:700;border-top:2px solid #333;padding-top:6px;margin-top:6px;}
.footer{margin-top:24px;text-align:center;font-size:12px;color:#777;border-top:1px solid #eee;padding-top:12px;}
</style>
<div class="inv-wrap">
<div class="watermark">${STORE_NAME}</div>
<div class="inv-content">
<div class="inv-header">
  <h1>🌿 ${STORE_NAME}</h1>
  <p>فاتورة مبيعات</p>
  <p>رقم الفاتورة: <b>#${invNo}</b></p>
</div>
<div class="inv-meta">
  <div class="block">
    <span style="color:#888;font-size:12px;">التاريخ والوقت</span>
    <b>${sale.date} · ${sale.time}</b>
    <span style="color:#888;font-size:12px;display:block;margin-top:6px;">طريقة الدفع</span>
    <b>${sale.payType==="cash"?"نقداً 💵":sale.payType==="debt"?"دين 📋":"بطاقة 💳"}</b>
  </div>
  <div class="block" style="text-align:right;">
    <span style="color:#888;font-size:12px;">اسم الزبون</span>
    <b>${sale.customer.name}</b>
    ${sale.customer.phone?`<span style="color:#888;font-size:12px;display:block;margin-top:6px;">رقم الهاتف</span><b>${sale.customer.phone}</b>`:""}
  </div>
</div>
<table>
<thead><tr><th>المنتج</th><th>عدد القطع</th><th>سعر القطعة</th><th>المجموع</th></tr></thead>
<tbody>
<tr>
  <td>${sale.productName}${sale.sku?" ("+sale.sku+")":""}</td>
  <td style="text-align:center;">${sale.qty}</td>
  <td>${(sale.sellPrice||0).toFixed(2)}</td>
  <td><b>${sale.total.toFixed(2)}</b></td>
</tr>
</tbody>
</table>
<div class="totals">
  <div>المجموع الكلي: <b>${sale.total.toFixed(2)}</b></div>
  ${sale.customer.note?`<div style="color:#666;">ملاحظة: ${sale.customer.note}</div>`:""}
</div>
<div class="footer">شكراً لتعاملكم مع ${STORE_NAME} 🌿<br/>المبلغ المستلم بموجب هذه الفاتورة</div>
</div>
</div>`;
  }

  // ── النسخ الاحتياطي ─────────────────────────────────
  function doBackup(){
    const data={products,sales,debts,suppliers,expenses,returns,purchaseOrders,notes,backupDate:new Date().toLocaleString("ar-IQ")};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="backup_"+new Date().toLocaleDateString("ar-IQ").replace(/\//g,"-")+".json";a.click();
  }

  function doRestore(file){
    const r=new FileReader();
    r.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(d.products){setProducts(d.products);}
        if(d.sales){setSales(d.sales);}
        if(d.debts){setDebts(d.debts);}
        if(d.suppliers){setSuppliers(d.suppliers);}
        if(d.expenses){setExpenses(d.expenses);}
        if(d.returns){setReturns(d.returns);}
        if(d.purchaseOrders){setPurchaseOrders(d.purchaseOrders);}
        if(d.notes){setNotes(d.notes);}
        alert("✅ تم استعادة النسخة الاحتياطية بنجاح!");
      }catch{alert("❌ الملف غير صحيح");}
    };
    r.readAsText(file);
  }

  // ── حساب حجم البيانات ──────────────────────────────
  function getStorageSize(){
    let total=0;
    ["vape_products","vape_sales","vape_debts","vape_suppliers","vape_expenses","vape_returns","vape_po","vape_notes"].forEach(k=>{
      const v=localStorage.getItem(k)||"";total+=v.length;
    });
    return(total/1024).toFixed(2);
  }

  const poItemsTotal=po.items.reduce((s,i)=>s+(+i.price||0)*(+i.qty||0),0);
  const poFinal=Math.max(0,poItemsTotal-(+po.discount||0));
  const filtered=products.filter(p=>{const s=search.trim().toLowerCase();return(!s||p.name.toLowerCase().includes(s)||(p.sku||"").toLowerCase().includes(s))&&(filterCat==="الكل"||p.category===filterCat);});
  const filteredSales=sales.filter(r=>{const s=salesSearch.trim().toLowerCase();return!s||r.productName.toLowerCase().includes(s)||(r.customer?.name||"").includes(s)||(r.customer?.phone||"").includes(s);});
  const dailySales=sales.filter(s=>s.date===dailyDate);
  const totalInv=products.reduce((s,p)=>s+(p.sellPrice||0)*p.quantity,0);

  const totalRev=sales.reduce((s,r)=>s+r.total,0);

  const totalDebts=debts.filter(d=>d.status==="unpaid").reduce((s,d)=>s+(+d.amount||0),0);
  const totalExpenses=expenses.reduce((s,e)=>s+(+e.amount||0),0);
  const sqC=q=>q===0?T.red:q<=3?T.amber:T.green;
  const sqB=q=>q===0?T.redBg:q<=3?T.amberBg:T.greenBg;
  const card={background:T.card,border:"1px solid "+T.border,borderRadius:14};
  const inp={padding:"9px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.input,color:T.text,fontSize:14,width:"100%",boxSizing:"border-box",textAlign:"right",direction:"rtl"};
  const btn=(x={})=>({padding:"8px 14px",borderRadius:8,border:"1px solid "+T.border,background:"transparent",cursor:"pointer",fontSize:13,color:T.text,...x});

  const sc={background:T.statBg,border:"1px solid "+T.border,borderRadius:12,padding:"0.75rem 1rem"};
  const MENU=ALL_PAGES.filter(p=>can(p.k));

  if(screen==="login"||screen==="register")

  if(loading)return(<div style={{background:T.bg,color:T.text,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,fontFamily:"'Segoe UI',sans-serif"}}><div style={{fontSize:44}}>🌿</div><div style={{color:T.sub}}>جاري المزامنة...</div></div>);

    <div style={{background:T.bg,color:T.text,minHeight:"100vh",display:"flex",fontFamily:"'Segoe UI',Tahoma,sans-serif",direction:"rtl",position:"relative"}}>

      {/* overlay موبايل */}

      <div className="sidebar" style={{width:200,minHeight:"100vh",background:T.sidebar,borderLeft:"1px solid "+T.sidebarBorder,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",overflowY:"auto",transition:"all .2s",...(sidebarOpen?{display:"flex",position:"fixed",zIndex:500,width:220,height:"100vh",top:0,right:0}:{})}}>
        <div style={{padding:"1rem",borderBottom:"1px solid "+T.sidebarBorder}}>
          <div style={{fontWeight:700,fontSize:13,background:"linear-gradient(90deg,"+T.accent+","+T.green+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🌿 {STORE_NAME}</div>

          {saving&&<span style={{fontSize:12,color:T.amber}}>⏳ {saving}</span>}

        {/* الرئيسية */}
        {page==="dashboard"&&(<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
            {[["📦 قيمة المخزون","$"+totalInv.toFixed(2),T.accent],isAdmin&&["💸 تكلفة المخزون","$"+totalCost.toFixed(2),T.sub],[products.length+" صنف · "+totalUnits+" وحدة","🗂 المواد",T.text],["💰 إيراد المبيعات","$"+totalRev.toFixed(2),T.green],isAdmin&&["📈 صافي الربح","$"+totalProfit.toFixed(2),totalProfit>=0?T.green:T.red],["💳 ديون غير مسددة","$"+totalDebts.toFixed(2),T.red],["💸 المصروفات","$"+totalExpenses.toFixed(2),T.amber],["⚠️ مخزون منخفض",products.filter(p=>p.quantity<=3).length+" صنف",T.amber]].filter(Boolean).map(([l,v,c])=>(<div key={l} style={sc}><div style={{fontSize:11,color:T.sub,marginBottom:3}}>{l}</div><div style={{fontSize:15,fontWeight:700,color:c}}>{v}</div></div>))}

                    <div><span style={lbl}>التصنيف</span><select value={editForm.category} onChange={e=>setEditForm(f=>({...f,category:e.target.value}))} style={{...inp,cursor:"pointer"}}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
                    <div><span style={lbl}>الكود</span><input value={editForm.sku||""} onChange={e=>setEditForm(f=>({...f,sku:e.target.value}))} style={inp}/></div>
                    <div><span style={lbl}>سعر الشراء</span><input type="number" value={editForm.buyPrice} onChange={e=>setEditForm(f=>({...f,buyPrice:e.target.value}))} style={{...inp,borderColor:T.amber}}/></div>
                    <div><span style={lbl}>سعر البيع</span><input type="number" value={editForm.sellPrice} onChange={e=>setEditForm(f=>({...f,sellPrice:e.target.value}))} style={{...inp,borderColor:T.green}}/></div>
                    <div style={{gridColumn:"1/-1"}}><span style={lbl}>الكمية</span><input type="number" value={editForm.quantity} onChange={e=>setEditForm(f=>({...f,quantity:e.target.value}))} style={inp}/></div>

                    </div>
                  </div>

                <div style={{display:"flex",alignItems:"stretch",flexWrap:"wrap"}}>
                  {p.image&&<div style={{width:70,display:"flex",alignItems:"center",justifyContent:"center",padding:"0.5rem",borderLeft:"1px solid "+T.border}}><img src={p.image} style={{width:56,height:56,objectFit:"cover",borderRadius:8}}/></div>}
                  <div style={{flex:1,minWidth:140,padding:"0.85rem",borderLeft:"1px solid "+T.border}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{p.name}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:4}}>
                      <span style={{fontSize:11,background:T.statBg,border:"1px solid "+T.border,borderRadius:5,padding:"2px 7px",color:T.sub}}>{p.category}</span>
                      {p.sku&&<span style={{fontSize:11,color:T.sub}}>{p.sku}</span>}
                    </div>
                    {p.addedBy&&<div style={{fontSize:11,color:T.sub}}>أضافه: {p.addedBy}</div>}
                    {isAdmin&&p.buyPrice&&p.sellPrice&&<div style={{fontSize:11,color:T.green,marginTop:2}}>ربح الوحدة: ${(p.sellPrice-p.buyPrice).toFixed(2)}</div>}
                  </div>
                  {isAdmin?(<div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0.75rem",borderLeft:"1px solid "+T.border,minWidth:110,gap:4}}>
                    <div style={{textAlign:"center"}}><div style={{fontSize:10,color:T.sub}}>سعر الشراء</div><div style={{fontSize:14,fontWeight:700,color:T.amber}}>${(p.buyPrice||0).toFixed(2)}</div></div>
                    <div style={{width:"70%",height:1,background:T.border}}/>
                    <div style={{textAlign:"center"}}><div style={{fontSize:10,color:T.sub}}>سعر البيع</div><div style={{fontSize:14,fontWeight:700,color:T.green}}>${(p.sellPrice||0).toFixed(2)}</div></div>
                  </div>):(<div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0.75rem",borderLeft:"1px solid "+T.border,minWidth:110}}>
                    <div style={{fontSize:10,color:T.sub}}>سعر البيع</div>
                    <div style={{fontSize:15,fontWeight:700,color:T.green}}>${(p.sellPrice||0).toFixed(2)}</div>
                  </div>)}
                  <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0.75rem",borderLeft:"1px solid "+T.border,minWidth:110,gap:4}}>
                    <div style={{fontSize:10,color:T.sub}}>الكمية</div>
                    <div style={{fontSize:20,fontWeight:700,background:sqB(p.quantity),color:sqC(p.quantity),borderRadius:9,padding:"3px 13px"}}>{p.quantity}</div>

                      <button onClick={()=>adjustQty(p.id,1)} style={{width:27,height:27,borderRadius:6,border:"1px solid "+T.border,background:"transparent",cursor:"pointer",fontSize:16,color:T.green}}>+</button>
                      <button onClick={()=>adjustQty(p.id,-1)} style={{width:27,height:27,borderRadius:6,border:"1px solid "+T.border,background:"transparent",cursor:"pointer",fontSize:16,color:T.red}}>−</button>
                    </div>
                    {isAdmin&&<div style={{fontSize:10,color:T.sub}}><span style={{color:T.accent,fontWeight:700}}>${((p.sellPrice||0)*p.quantity).toFixed(2)}</span></div>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",justifyContent:"center",gap:5,padding:"0.75rem"}}>
                    <button onClick={()=>{setSaleModal(p);setSaleQty(1);setCust(emptyCust);setCustErr("");}} style={{padding:"7px 12px",borderRadius:8,border:"none",background:T.sellBtn,color:T.sellBtnTxt,cursor:"pointer",fontSize:12,fontWeight:700}}>💰 بيع</button>
                    {can("addProduct")&&<button onClick={()=>{setEditId(String(p.id));setEditForm({...p,buyPrice:p.buyPrice||"",sellPrice:p.sellPrice||"",quantity:p.quantity,sku:p.sku||"",image:p.image||""});}} style={btn({padding:"6px 12px",fontSize:12})}>✏️ تعديل</button>}
                    {isAdmin&&<button onClick={()=>deleteProduct(p.id)} style={btn({color:T.red,borderColor:T.redBg,padding:"6px 12px",fontSize:12})}>🗑</button>}
                  </div>
                </div>)}
              </div>))}
            </div>
          )}
        </>)}

        {/* إضافة مادة */}
        {page==="addProduct"&&(<div style={{...card,padding:"1.5rem",maxWidth:620}}>
          <div style={{fontWeight:700,fontSize:15,color:T.accent,marginBottom:"1.1rem"}}>➕ إضافة منتج جديد</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1/-1"}}><span style={lbl}>اسم المنتج *</span><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="مثال: معسل تفاح 250 جم" style={inp}/></div>
            <div><span style={lbl}>التصنيف</span><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{...inp,cursor:"pointer"}}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div><span style={lbl}>الكود (اختياري)</span><input value={form.sku} onChange={e=>setForm(f=>({...f,sku:e.target.value}))} placeholder="HK-AP-250" style={inp}/></div>
            <div><span style={lbl}>سعر الشراء ($) *</span><input type="number" min="0" value={form.buyPrice} onChange={e=>setForm(f=>({...f,buyPrice:e.target.value}))} placeholder="0.00" style={{...inp,borderColor:T.amber}}/></div>
            <div><span style={lbl}>سعر البيع ($) *</span><input type="number" min="0" value={form.sellPrice} onChange={e=>setForm(f=>({...f,sellPrice:e.target.value}))} placeholder="0.00" style={{...inp,borderColor:T.green}}/></div>
            {form.buyPrice&&form.sellPrice&&+form.sellPrice>0&&(<div style={{gridColumn:"1/-1",background:T.statBg,borderRadius:8,padding:"8px 14px",fontSize:13}}>ربح الوحدة: <b style={{color:T.green}}>${(+form.sellPrice-+form.buyPrice).toFixed(2)}</b> · هامش: <b style={{color:T.accent}}>{((+form.sellPrice-+form.buyPrice)/+form.sellPrice*100).toFixed(1)}%</b></div>)}

            <div style={{gridColumn:"1/-1"}}>
              <span style={lbl}>صورة المنتج (اختياري)</span>

              <input type="file" accept="image/*" onChange={e=>e.target.files[0]&&readImage(e.target.files[0],img=>setForm(f=>({...f,image:img})))} style={{...inp,padding:"6px"}}/>

            <div style={{gridColumn:"1/-1"}}><span style={lbl}>المضاف بواسطة</span><input value={user.name} disabled style={{...inp,opacity:0.6}}/></div>

            <button onClick={handleAdd} style={{padding:"10px 26px",borderRadius:9,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:14,fontWeight:700}}>إضافة إلى المخزون</button>
            <button onClick={()=>{setForm(emptyForm);setFormErr("");}} style={btn({color:T.sub})}>مسح</button>
          </div>
        </div>)}

        {/* سجل المبيعات */}
        {page==="sales"&&(<>
          {isAdmin&&(<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:"1rem"}}>
            {[["الإيراد","$"+totalRev.toFixed(2),T.accent],["الربح","$"+totalProfit.toFixed(2),totalProfit>=0?T.green:T.red],["العمليات",sales.length,T.text],["الوحدات",sales.reduce((s,r)=>s+r.qty,0),T.text]].map(([l,v,c])=>(<div key={l} style={sc}><div style={{fontSize:10,color:T.sub,marginBottom:3}}>{l}</div><div style={{fontSize:17,fontWeight:700,color:c}}>{v}</div></div>))}
          </div>)}

            <input placeholder="ابحث..." value={salesSearch} onChange={e=>setSalesSearch(e.target.value)} style={{...inp,flex:1}}/>

              <button onClick={()=>exportExcel(sales,"المبيعات",["المنتج","الكمية","سعر الشراء","سعر البيع","المبلغ الصافي","الربح","الزبون","طريقة الدفع","التاريخ"],["productName","qty","buyPrice","sellPrice","total","profit","soldBy","payType","date"])} style={btn({fontSize:12,padding:"6px 10px",color:T.green,borderColor:T.greenBg})}>📥 Excel</button>
              <button onClick={()=>printHTML(`<h2>${STORE_NAME}</h2><h3>تقرير المبيعات</h3><table><thead><tr><th>المنتج</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>الصافي</th><th>الزبون</th><th>التاريخ</th></tr></thead><tbody>${sales.map(r=>`<tr><td>${r.productName}</td><td>${r.qty}</td><td>$${(r.buyPrice||0).toFixed(2)}</td><td>$${(r.sellPrice||0).toFixed(2)}</td><td>$${r.total.toFixed(2)}</td><td>${r.customer?.name||""}</td><td>${r.date}</td></tr>`).join("")}</tbody></table><p class="ttl">الإجمالي: $${totalRev.toFixed(2)}</p>`)} style={btn({fontSize:12,padding:"6px 10px",color:T.red,borderColor:T.redBg})}>📄 PDF</button>
            </>}
          </div>
          {filteredSales.length===0?(<div style={{...card,textAlign:"center",padding:"3rem",color:T.sub}}>لا توجد مبيعات.</div>):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filteredSales.map(r=>(<div key={r.saleId} style={card}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"0.85rem 1rem",cursor:"pointer",flexWrap:"wrap"}} onClick={()=>setExpandedSale(expandedSale===r.saleId?null:r.saleId)}>

ilter(d=>d.status==="unpaid"),"الديون",["الزبون","الهاتف","المبلغ","التاريخ"],["customerName","phone","amount","date"]),pdf:()=>printHTML(`<h2>${STORE_NAME}</h2><h3>تقرير الديون</h3><table><thead><tr><th>الزبون</th><th>الهاتف</th><th>المبلغ</th><th>التاريخ</th></tr></thead><tbody>${debts.filter(d=>d.status==="unpaid").map(d=>`<tr><td>${d.customerName}</td><td>${d.phone||"—"}</td><td>$${(+d.amount||0).toFixed(2)}</td><td>${d.date}</td></tr>`).join("")}</tbody></table><p class="ttl">الإجمالي: $${totalDebts.toFixed(2)}</p>`)}].map(r=>(<div key={r.t} style={{...card,padding:"1.25rem"}}><div style={{fontWeight:700,marginBottom:4}}>{r.t}</div><div style={{fontSize:12,color:T.sub,marginBottom:"1rem"}}>{r.d}</div><div style={{display:"flex",gap:8}}><button onClick={r.xl} style={btn({flex:1,color:T.green,borderColor:T.greenBg,padding:"8px"})}>📥 Excel</button><button onClick={r.pdf} style={btn({flex:1,color:T.red,borderColor:T.redBg,padding:"8px"})}>📄 PDF</button></div></div>))}

// ══ إدارة المستخدمين ════════════════════════════════════
function UsersManager({T,users,setUsers,user,refreshUser,btn,lbl,inp,card}){
  const[tab,setTab]=useState("list");
  const[editU,setEditU]=useState(null);
  // إظهار جميع المستخدمين بما فيهم pending
  const pending=users.filter(u=>u.status==="pending");
  const approved=users.filter(u=>u.status==="approved");
  function approveUser(id){setUsers(prev=>prev.map(u=>u.id===id?{...u,status:"approved"}:u));}
  function rejectUser(id){if(!confirm("رفض وحذف الطلب؟"))return;setUsers(prev=>prev.filter(u=>u.id!==id));}
  function deleteUser(id){if(!confirm("حذف المستخدم؟"))return;setUsers(prev=>prev.filter(u=>u.id!==id));}
  function saveUserEdit(){setUsers(prev=>prev.map(u=>u.id===editU.id?editU:u));if(editU.id===user.id)refreshUser(editU);setEditU(null);}

  return(<div>
    <div style={{display:"flex",gap:6,marginBottom:"1.25rem",flexWrap:"wrap"}}>
      {[["list","👥 المستخدمون ("+approved.length+")"],["pending","⏳ طلبات الانضمام"+(pending.length>0?" ("+pending.length+")":"")]].map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} style={{padding:"8px 16px",borderRadius:9,border:"1px solid "+(tab===k?T.accent:T.border),background:tab===k?T.accent:"transparent",color:tab===k?T.accentText:T.sub,cursor:"pointer",fontSize:13,fontWeight:tab===k?700:400}}>{l}</button>))}
    </div>
    {tab==="list"&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
      {approved.map(u=>(<div key={u.id} style={{...card,padding:"1rem"}}>
        {editU?.id===u.id?(<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><span style={lbl}>الاسم</span><input value={editU.name} onChange={e=>setEditU(x=>({...x,name:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>رقم الهاتف</span><input value={editU.phone} onChange={e=>setEditU(x=>({...x,phone:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>كلمة المرور</span><input value={editU.password} onChange={e=>setEditU(x=>({...x,password:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>الدور</span><select value={editU.role} onChange={e=>setEditU(x=>({...x,role:e.target.value,perms:ROLES[e.target.value].defaultPerms}))} style={{...inp,cursor:"pointer"}}>{Object.entries(ROLES).map(([k,v])=>(<option key={k} value={k}>{v.label}</option>))}</select></div>
          </div>
          <div style={{marginBottom:10}}>
            <span style={lbl}>الصلاحيات</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ALL_PAGES.map(p=>(<label key={p.k} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer",background:T.statBg,borderRadius:6,padding:"4px 8px",border:"1px solid "+(editU.perms.includes(p.k)?T.accent:T.border)}}>
                <input type="checkbox" checked={editU.perms.includes(p.k)} onChange={e=>setEditU(x=>({...x,perms:e.target.checked?[...x.perms,p.k]:x.perms.filter(pp=>pp!==p.k)}))} style={{accentColor:T.accent}}/>{p.l}
              </label>))}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveUserEdit} style={btn({flex:1,fontWeight:700,border:"1px solid "+T.accent,color:T.accent})}>حفظ</button>
            <button onClick={()=>setEditU(null)} style={btn({flex:1,color:T.sub})}>إلغاء</button>
          </div>
        </div>):(<div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{u.name}</div><div style={{fontSize:12,color:T.sub}}>{u.phone}</div></div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>approveUser(u.id)} style={{padding:"7px 16px",borderRadius:8,border:"none",background:T.green,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>✅ قبول</button>
              <button onClick={()=>rejectUser(u.id)} style={btn({color:T.red,borderColor:T.redBg,padding:"7px 16px",fontSize:13})}>❌ رفض</button>
            </div>
          </div>))}
        </div>
      )}
    </div>)}
  </div>);
}

// ══ شاشة تسجيل الدخول ════════════════════════════════════
function AuthScreen({screen,setScreen,onLogin,T,themeName,setThemeName,users,setUsers}){
  const[phone,setPhone]=useState("");
  const[pass,setPass]=useState("");
  const[showPass,setShowPass]=useState(false);
  const[err,setErr]=useState("");
  const[rName,setRName]=useState("");
  const[rPhone,setRPhone]=useState("");
  const[rRole,setRRole]=useState("staff");
  const[rPass,setRPass]=useState("");
  const[rPass2,setRPass2]=useState("");
  const[rErr,setRErr]=useState("");
  const[rOk,setROk]=useState(false);

  function handleLogin(){
    if(!phone.trim()||!pass.trim()){setErr("يرجى إدخال رقم الهاتف وكلمة المرور");return;}
    const found=users.find(u=>u.phone===phone.trim()&&u.password===pass);
    if(!found){setErr("رقم الهاتف أو كلمة المرور غير صحيحة");return;}
    if(found.status==="pending"){setErr("حسابك قيد المراجعة. انتظر موافقة المدير.");return;}
    onLogin(found);
  }

  function handleRegister(){
    if(!rName.trim()||!rPhone.trim()||!rPass.trim()){setRErr("يرجى إكمال جميع الحقول");return;}
    if(rPass!==rPass2){setRErr("كلمة المرور غير متطابقة");return;}
    if(users.find(u=>u.phone===rPhone.trim())){setRErr("رقم الهاتف مسجل مسبقاً");return;}
    const newUser={id:Date.now().toString(),name:rName.trim(),phone:rPhone.trim(),password:rPass,role:rRole,status:"pending",perms:ROLES[rRole].defaultPerms};
    setUsers(prev=>[...prev,newUser]);
    setROk(true);
  }

  const i2={padding:"10px 12px",borderRadius:9,border:"1px solid "+T.border,background:T.input,color:T.text,fontSize:14,width:"100%",boxSizing:"border-box",textAlign:"right",direction:"rtl"};

  return(<div style={{background:T.bg,color:T.text,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',Tahoma,sans-serif",direction:"rtl",padding:"1rem"}}>
    <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:18,padding:"2rem",width:"100%",maxWidth:400}}>
      <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
        <div style={{fontSize:44,marginBottom:6}}>🌿</div>
        <h2 style={{fontSize:19,fontWeight:700,background:"linear-gradient(90deg,"+T.accent+","+T.green+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>متجر الفيب والشيشة</h2>
        <p style={{fontSize:12,color:T.sub,marginTop:3}}>نظام إدارة المخزون والمبيعات</p>
      </div>
      {screen==="login"&&(<div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
          <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>📱 رقم الهاتف</div><input value={phone} onChange={e=>setPhone(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="07X XXXX XXXX" style={i2}/></div>
          <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>🔒 كلمة المرور</div>
            <div style={{position:"relative"}}>
              <input type={showPass?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••" style={{...i2,paddingLeft:36}}/>
              <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.sub,fontSize:14}}>{showPass?"🙈":"👁"}</button>
            </div>
          </div>
        </div>
        {err&&<div style={{marginBottom:10,fontSize:13,color:T.red,padding:"8px",background:T.redBg,borderRadius:7,textAlign:"center"}}>{err}</div>}
        <button onClick={handleLogin} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:15,fontWeight:700,marginBottom:"0.75rem"}}>تسجيل الدخول</button>
        <button onClick={()=>{setScreen("register");setErr("");}} style={{width:"100%",padding:"9px",borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.sub,cursor:"pointer",fontSize:13}}>طلب انضمام جديد</button>
        <div style={{textAlign:"center",fontSize:11,color:T.sub,marginTop:"1rem"}}>👑 المدير: 07700000000 / admin123</div>
      </div>)}
      {screen==="register"&&(<div>
        {rOk?(<div style={{textAlign:"center",padding:"1rem"}}>
          <div style={{fontSize:36,marginBottom:8}}>✅</div>
          <div style={{fontWeight:700,marginBottom:4}}>تم إرسال طلب الانضمام</div>
          <div style={{fontSize:13,color:T.sub,marginBottom:"1.25rem"}}>انتظر موافقة المدير على حسابك</div>
          <button onClick={()=>{setScreen("login");setROk(false);}} style={{padding:"9px 24px",borderRadius:9,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:13,fontWeight:700}}>العودة</button>
        </div>):(<div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>👤 الاسم الكامل</div><input value={rName} onChange={e=>setRName(e.target.value)} placeholder="أحمد محمد" style={i2}/></div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>📱 رقم الهاتف</div><input value={rPhone} onChange={e=>setRPhone(e.target.value)} placeholder="07X XXXX XXXX" style={i2}/></div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>💼 المسمى الوظيفي</div>
              <select value={rRole} onChange={e=>setRRole(e.target.value)} style={{...i2,cursor:"pointer"}}>
                {Object.entries(ROLES).filter(([k])=>k!=="admin").map(([k,v])=>(<option key={k} value={k}>{v.label}</option>))}
              </select>
            </div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>🔒 كلمة المرور</div><input type="password" value={rPass} onChange={e=>setRPass(e.target.value)} placeholder="••••••••" style={i2}/></div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>🔒 تأكيد كلمة المرور</div><input type="password" value={rPass2} onChange={e=>setRPass2(e.target.value)} placeholder="••••••••" style={i2}/></div>
          </div>
          {rErr&&<div style={{marginBottom:10,fontSize:13,color:T.red,padding:"8px",background:T.redBg,borderRadius:7,textAlign:"center"}}>{rErr}</div>}
          <button onClick={handleRegister} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:14,fontWeight:700,marginBottom:"0.75rem"}}>إرسال طلب الانضمام</button>
          <button onClick={()=>{setScreen("login");setRErr("");}} style={{width:"100%",padding:"9px",borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.sub,cursor:"pointer",fontSize:13}}>العودة</button>
        </div>)}
      </div>)}
      <div style={{display:"flex",gap:5,justifyContent:"center",marginTop:"1.25rem"}}>
        {Object.entries(THEMES).map(([k,v])=>(<button key={k} onClick={()=>setThemeName(k)} style={{padding:"3px 9px",borderRadius:12,border:"1px solid "+(k===themeName?T.accent:T.border),background:k===themeName?T.accent:"transparent",color:k===themeName?T.accentText:T.sub,cursor:"pointer",fontSize:11}}>{v.name}</button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
