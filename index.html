<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>متجر الفيب والشيشة</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;-webkit-text-size-adjust:100%;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#555;border-radius:3px;}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{outline:2px solid #6c63ff;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:498;}
.overlay.show{display:block;}
.sidebar{position:sticky;top:0;height:100vh;transition:transform .25s;}
@media(max-width:680px){
  .sidebar{position:fixed!important;right:0;top:0;height:100vh!important;z-index:499;transform:translateX(100%);}
  .sidebar.open{transform:translateX(0);}
  .main-pad{padding:0.75rem 0.6rem!important;}
  .hide-mobile{display:none!important;}
  .menu-btn{display:flex!important;}
  .stat-grid{grid-template-columns:repeat(2,1fr)!important;}
  .prod-row{flex-direction:column!important;}
  .g2{grid-template-columns:1fr!important;}
}
.menu-btn{display:none;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const API="https://script.google.com/macros/s/AKfycbwgpvKIS5nK3j8c1ATj7OalqvAiij9mxjP9KrT-kSUBnuhG0rQFnlc-zheqQumei2BR/exec";
const STORE="متجر الفيب والشيشة";
const CATS=["جهاز فيب","سائل إلكتروني","شيشة","معسل","فحم","إكسسوارات","أخرى"];
const EXP_CATS=["عام","إيجار","رواتب","كهرباء","مياه","إنترنت","صيانة","نقل","أخرى"];
const ROLES={
  admin:{label:"مدير",color:"#6c63ff",p:["dashboard","inventory","addProduct","sales","dailyReport","debts","suppliers","expenses","returns","purchases","reports","accounts","notes","users","backup"]},
  accountant:{label:"محاسب",color:"#22c55e",p:["dashboard","accounts","reports","sales","dailyReport","expenses"]},
  warehouse:{label:"موظف مخزن",color:"#f59e0b",p:["dashboard","inventory","addProduct","returns"]},
  staff:{label:"موظف",color:"#8b8fa8",p:["dashboard","inventory","sales"]},
};
const PAGES=[
  {k:"dashboard",l:"🏠 الرئيسية"},{k:"inventory",l:"📦 المخزن"},{k:"addProduct",l:"➕ إضافة مادة"},
  {k:"sales",l:"📊 سجل المبيعات"},{k:"dailyReport",l:"📅 تقرير يومي"},{k:"debts",l:"💳 الديون"},
  {k:"suppliers",l:"🏭 الموردون"},{k:"expenses",l:"💸 المصروفات"},{k:"returns",l:"↩️ الطلبات الراجعة"},
  {k:"purchases",l:"🛒 قائمة الشراء"},{k:"reports",l:"📈 التقارير"},{k:"accounts",l:"💰 الحسابات"},
  {k:"notes",l:"📝 ملاحظات"},{k:"users",l:"👥 المستخدمون"},{k:"backup",l:"💾 النسخ الاحتياطي"},
];
const DADMIN={id:"1",name:"المدير",phone:"07700000000",password:"admin123",role:"admin",status:"approved",perms:ROLES.admin.p};
const T_={
  dark:{n:"🌙 داكن",bg:"#0f1117",card:"#1a1d27",bo:"#2a2d3a",tx:"#e8eaf0",sub:"#8b8fa8",ac:"#6c63ff",at:"#fff",gr:"#22c55e",gb:"rgba(34,197,94,.12)",rd:"#ef4444",rb:"rgba(239,68,68,.12)",am:"#f59e0b",ab:"rgba(245,158,11,.12)",in:"#12151f",st:"#12151f",sb:"#13151f",sbb:"#22253a",sel:"#22c55e",set:"#fff"},
  light:{n:"☀️ فاتح",bg:"#f4f6fb",card:"#fff",bo:"#dde2f0",tx:"#1a1d2e",sub:"#6b7280",ac:"#4f46e5",at:"#fff",gr:"#16a34a",gb:"#dcfce7",rd:"#dc2626",rb:"#fee2e2",am:"#b45309",ab:"#fef3c7",in:"#f9fafb",st:"#eef1f8",sb:"#fff",sbb:"#dde2f0",sel:"#16a34a",set:"#fff"},
  gold:{n:"✨ ذهبي",bg:"#1a1400",card:"#221c00",bo:"#3d3200",tx:"#ffe98a",sub:"#9e8c4a",ac:"#f5c518",at:"#000",gr:"#a3e635",gb:"rgba(163,230,53,.12)",rd:"#f87171",rb:"rgba(248,113,113,.12)",am:"#fb923c",ab:"rgba(251,146,60,.12)",in:"#120f00",st:"#120f00",sb:"#120f00",sbb:"#3d3200",sel:"#f5c518",set:"#000"},
};
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getUsers(){return ls("vape_users",[DADMIN]);}
async function ga(p){try{const r=await fetch(API+"?"+new URLSearchParams(p));return r.json();}catch{return{ok:false};}}
async function gp(b){try{const r=await fetch(API,{method:"POST",body:JSON.stringify(b)});return r.json();}catch{return{ok:false};}}
function readImg(f,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(f);}
function getInvNum(){const n=parseInt(ls("vape_inv",1000))+1;ss("vape_inv",n);return n;}
function exportXL(data,fn,hdr,keys){
  const ws=XLSX.utils.json_to_sheet(data.map(r=>Object.fromEntries(keys.map((k,i)=>[hdr[i],typeof r[k]==="object"?JSON.stringify(r[k]):r[k]]))));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"data");XLSX.writeFile(wb,fn+".xlsx");
}
function printW(html){
  const w=window.open("","_blank");
  w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:20px;color:#111;}h2,h3{text-align:center;}table{width:100%;border-collapse:collapse;margin:10px 0;}th,td{border:1px solid #ccc;padding:8px;text-align:right;font-size:13px;}th{background:#f5f5f5;}.ttl{font-weight:700;font-size:15px;margin-top:10px;}</style></head><body>${html}</body></html>`);
  w.document.close();w.print();
}
function invoiceHTML(sale){
  const no=sale.invoiceNum||sale.saleId;
  return`<style>
body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:28px;color:#111;max-width:600px;margin:auto;}
.wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:68px;color:rgba(0,0,0,0.055);font-weight:900;white-space:nowrap;pointer-events:none;}
.hdr{text-align:center;border-bottom:2px solid #222;padding-bottom:12px;margin-bottom:16px;}
.hdr h1{font-size:24px;margin-bottom:4px;}
.meta{display:flex;justify-content:space-between;margin-bottom:14px;font-size:13px;}
.meta .bl{text-align:right;}
.meta .bl span{color:#888;display:block;margin-bottom:2px;}
.meta .bl b{font-size:15px;}
table{width:100%;border-collapse:collapse;margin:14px 0;}
th,td{border:1px solid #ccc;padding:9px 11px;text-align:right;font-size:13px;}
th{background:#f5f5f5;font-weight:700;}
.tot{margin-top:10px;text-align:left;font-size:14px;font-weight:700;border-top:2px solid #222;padding-top:8px;}
.ftr{margin-top:20px;text-align:center;font-size:12px;color:#888;border-top:1px solid #eee;padding-top:10px;}
</style>
<div class="wm">${STORE}</div>
<div class="hdr"><h1>🌿 ${STORE}</h1><p>فاتورة مبيعات — رقم: <b>#${no}</b></p></div>
<div class="meta">
  <div class="bl"><span>التاريخ والوقت</span><b>${sale.date} · ${sale.time}</b><br/><br/><span>طريقة الدفع</span><b>${sale.payType==="cash"?"نقداً 💵":sale.payType==="debt"?"دين 📋":"بطاقة 💳"}</b></div>
  <div class="bl"><span>اسم الزبون</span><b>${sale.customer.name}</b>${sale.customer.phone?`<br/><br/><span>رقم الهاتف</span><b>${sale.customer.phone}</b>`:""}</div>
</div>
<table><thead><tr><th>المنتج</th><th>عدد القطع</th><th>سعر القطعة</th><th>المجموع</th></tr></thead>
<tbody><tr><td>${sale.productName}${sale.sku?" ("+sale.sku+")":""}</td><td style="text-align:center">${sale.qty}</td><td>$${(sale.sellPrice||0).toFixed(2)}</td><td><b>$${sale.total.toFixed(2)}</b></td></tr></tbody></table>
<div class="tot">المجموع الكلي: $${sale.total.toFixed(2)}</div>
${sale.customer.note?`<p style="margin-top:8px;font-size:13px;color:#666">ملاحظة: ${sale.customer.note}</p>`:""}
<div class="ftr">شكراً لتعاملكم مع ${STORE} 🌿<br/>المبلغ المستلم بموجب هذه الفاتورة</div>`;
}
const eForm={name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:"",image:""};
const eCust={name:"",phone:"",note:"",payType:"cash"};
const ePO={supplierName:"",date:new Date().toLocaleDateString("ar-IQ"),notes:"",discount:"0",items:[{name:"",qty:"1",price:""}]};

function App(){
  const[user,setUser]=useState(()=>ls("vape_session",null));
  const[screen,setScreen]=useState(()=>ls("vape_session",null)?"main":"login");
  const[tn,setTn]=useState(()=>localStorage.getItem("vape_theme")||"dark");
  const[products,setP_]=useState(()=>ls("vape_products",[]));
  const[sales,setSa_]=useState(()=>ls("vape_sales",[]));
  const[notes,setNo_]=useState(()=>ls("vape_notes",""));
  const[debts,setDe_]=useState(()=>ls("vape_debts",[]));
  const[suppliers,setSu_]=useState(()=>ls("vape_suppliers",[]));
  const[expenses,setEx_]=useState(()=>ls("vape_expenses",[]));
  const[returns,setRe_]=useState(()=>ls("vape_returns",[]));
  const[pos,setPO_]=useState(()=>ls("vape_po",[]));
  const[users,setUs_]=useState(getUsers);
  const[syncing,setSyncing]=useState(false);
  const[saving,setSaving]=useState("");
  const[page,setPage]=useState("dashboard");
  const[sideOpen,setSideOpen]=useState(false);
  const[search,setSearch]=useState("");
  const[fCat,setFCat]=useState("الكل");
  const[editId,setEditId]=useState(null);
  const[editF,setEditF]=useState({});
  const[form,setForm]=useState(eForm);
  const[fErr,setFErr]=useState("");
  const[saleM,setSaleM]=useState(null);
  const[sQty,setSQty]=useState(1);
  const[cust,setCust]=useState(eCust);
  const[cErr,setCErr]=useState("");
  const[sSrch,setSSrch]=useState("");
  const[expSale,setExpSale]=useState(null);
  const[po,setPo]=useState(ePO);
  const[printInv,setPrintInv]=useState(null);
  const[dForm,setDForm]=useState({customerName:"",phone:"",amount:"",note:"",date:new Date().toLocaleDateString("ar-IQ"),status:"unpaid"});
  const[suForm,setSuForm]=useState({name:"",phone:"",address:"",notes:""});
  const[exForm,setExForm]=useState({title:"",amount:"",category:"عام",date:new Date().toLocaleDateString("ar-IQ"),notes:""});
  const[rtForm,setRtForm]=useState({productName:"",qty:"1",reason:"",date:new Date().toLocaleDateString("ar-IQ"),customerName:"",refundAmount:"",status:"pending"});
  const[dDay,setDDay]=useState(new Date().toLocaleDateString("ar-IQ"));
  const T=T_[tn];

  function sP(v){const d=typeof v==="function"?v(products):v;setP_(d);ss("vape_products",d);}
  function sSa(v){const d=typeof v==="function"?v(sales):v;setSa_(d);ss("vape_sales",d);}
  function sNo(v){setNo_(v);ss("vape_notes",v);}
  function sDe(v){const d=typeof v==="function"?v(debts):v;setDe_(d);ss("vape_debts",d);}
  function sSu(v){const d=typeof v==="function"?v(suppliers):v;setSu_(d);ss("vape_suppliers",d);}
  function sEx(v){const d=typeof v==="function"?v(expenses):v;setEx_(d);ss("vape_expenses",d);}
  function sRe(v){const d=typeof v==="function"?v(returns):v;setRe_(d);ss("vape_returns",d);}
  function sPO(v){const d=typeof v==="function"?v(pos):v;setPO_(d);ss("vape_po",d);}
  function sUs(v){const d=typeof v==="function"?v(users):v;setUs_(d);ss("vape_users",d);}

  useEffect(()=>{localStorage.setItem("vape_theme",tn);},[tn]);

  const sync=useCallback(async()=>{
    setSyncing(true);setSaving("جاري المزامنة...");
    try{const r=await ga({action:"getAll"});if(r?.ok?.data){if(r.data.products?.length)sP(r.data.products);if(r.data.sales?.length)sSa(r.data.sales);if(r.data.notes)sNo(r.data.notes);}}catch{}
    setSyncing(false);setSaving("");
  },[]);

  useEffect(()=>{if(user)sync();},[user]);

  const can=p=>user?.perms?.includes(p);
  const isA=user?.role==="admin";
  function login(u){setUser(u);ss("vape_session",u);setScreen("main");}
  function logout(){setUser(null);localStorage.removeItem("vape_session");setScreen("login");}
  function refU(u){setUser(u);ss("vape_session",u);}

  async function addProduct(){
    if(!form.name.trim()){setFErr("أدخل اسم المنتج");return;}
    if(form.buyPrice===""||+form.buyPrice<0){setFErr("أدخل سعر الشراء");return;}
    if(form.sellPrice===""||+form.sellPrice<0){setFErr("أدخل سعر البيع");return;}
    if(form.quantity===""||+form.quantity<0){setFErr("أدخل الكمية");return;}
    setSaving("جاري الحفظ...");
    const p={name:form.name.trim(),category:form.category,buyPrice:+form.buyPrice,sellPrice:+form.sellPrice,quantity:+form.quantity,sku:form.sku.trim(),image:form.image||"",addedBy:user.name,addedDate:new Date().toLocaleDateString("ar-IQ")};
    const res=await gp({action:"saveProduct",product:p});
    sP(prev=>[...prev,res?.ok&&res.data?res.data:{...p,id:Date.now()}]);
    setForm(eForm);setFErr("");setPage("inventory");setSaving("");
  }

  async function saveEdit(id){
    setSaving("...");
    const p={...editF,id,buyPrice:+editF.buyPrice,sellPrice:+editF.sellPrice,quantity:+editF.quantity};
    await gp({action:"updateProduct",product:p});
    sP(prev=>prev.map(x=>String(x.id)===String(id)?{...x,...p}:x));
    setEditId(null);setSaving("");
  }

  async function delProduct(id){
    if(!confirm("حذف المنتج؟"))return;
    await gp({action:"deleteProduct",id});
    sP(prev=>prev.filter(p=>String(p.id)!==String(id)));
  }

  async function adjQty(id,d){
    const pr=products.find(p=>String(p.id)===String(id));if(!pr)return;
    const up={...pr,quantity:Math.max(0,pr.quantity+d)};
    sP(prev=>prev.map(p=>String(p.id)===String(id)?up:p));
    await gp({action:"updateProduct",product:up});
  }

  async function confirmSale(){
    if(!cust.name.trim()){setCErr("أدخل اسم الزبون");return;}
    setSaving("جاري تسجيل البيع...");
    const pr=saleM;
    const invN=getInvNum();
    const sale={saleId:Date.now(),invoiceNum:invN,productId:pr.id,productName:pr.name,category:pr.category,sku:pr.sku||"",qty:sQty,buyPrice:pr.buyPrice||0,sellPrice:pr.sellPrice||0,total:+((pr.sellPrice||0)*sQty).toFixed(2),profit:+((pr.sellPrice-pr.buyPrice)*sQty).toFixed(2),customer:cust,payType:cust.payType,soldBy:user.name,date:new Date().toLocaleDateString("ar-IQ"),time:new Date().toLocaleTimeString("ar-IQ",{hour:"2-digit",minute:"2-digit"})};
    const up={...pr,quantity:Math.max(0,pr.quantity-sQty)};
    await gp({action:"updateProduct",product:up});
    await gp({action:"saveSale",sale});
    sP(prev=>prev.map(p=>String(p.id)===String(pr.id)?up:p));
    sSa(prev=>[sale,...prev]);
    if(cust.payType==="debt")sDe(prev=>[{id:Date.now()+1,customerName:cust.name,phone:cust.phone||"",amount:sale.total,note:"بيع: "+pr.name,date:sale.date,status:"unpaid"},...prev]);
    setSaleM(null);setSQty(1);setCust(eCust);setCErr("");setPrintInv(sale);setSaving("");
  }

  async function delSale(id){
    if(!confirm("حذف السجل؟"))return;
    await gp({action:"deleteSale",saleId:id});
    sSa(prev=>prev.filter(s=>String(s.saleId)!==String(id)));
  }

  function backup(){
    const d={products,sales,debts,suppliers,expenses,returns,pos,notes,date:new Date().toLocaleString("ar-IQ")};
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));
    a.download="backup_"+new Date().toLocaleDateString("ar-IQ").replace(/\//g,"-")+".json";a.click();
  }
  function restore(file){
    const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.products)sP(d.products);if(d.sales)sSa(d.sales);if(d.debts)sDe(d.debts);if(d.suppliers)sSu(d.suppliers);if(d.expenses)sEx(d.expenses);if(d.returns)sRe(d.returns);if(d.pos)sPO(d.pos);if(d.notes)sNo(d.notes);alert("✅ تم الاستعادة!");}catch{alert("❌ ملف غير صحيح");}};r.readAsText(file);
  }
  function storSz(){let t=0;["vape_products","vape_sales","vape_debts","vape_suppliers","vape_expenses","vape_returns","vape_po","vape_notes"].forEach(k=>{t+=(localStorage.getItem(k)||"").length;});return(t/1024).toFixed(1);}

  const poTotal=po.items.reduce((s,i)=>s+(+i.price||0)*(+i.qty||0),0);
  const poFinal=Math.max(0,poTotal-(+po.discount||0));
  const filtered=products.filter(p=>{const s=search.toLowerCase();return(!s||p.name.toLowerCase().includes(s)||(p.sku||"").toLowerCase().includes(s))&&(fCat==="الكل"||p.category===fCat);});
  const fSales=sales.filter(r=>{const s=sSrch.toLowerCase();return!s||r.productName.toLowerCase().includes(s)||(r.customer?.name||"").includes(s)||(r.customer?.phone||"").includes(s);});
  const dSales=sales.filter(s=>s.date===dDay);
  const tInv=products.reduce((s,p)=>s+(p.sellPrice||0)*p.quantity,0);
  const tCost=products.reduce((s,p)=>s+(p.buyPrice||0)*p.quantity,0);
  const tUnits=products.reduce((s,p)=>s+p.quantity,0);
  const tRev=sales.reduce((s,r)=>s+r.total,0);
  const tPro=sales.reduce((s,r)=>s+(r.profit||0),0);
  const tDebt=debts.filter(d=>d.status==="unpaid").reduce((s,d)=>s+(+d.amount||0),0);
  const tExp=expenses.reduce((s,e)=>s+(+e.amount||0),0);
  const sqC=q=>q===0?T.rd:q<=3?T.am:T.gr;
  const sqB=q=>q===0?T.rb:q<=3?T.ab:T.gb;
  const C={background:T.card,border:"1px solid "+T.bo,borderRadius:14};
  const I={padding:"10px 12px",borderRadius:9,border:"1px solid "+T.bo,background:T.in,color:T.tx,fontSize:16,width:"100%",boxSizing:"border-box",textAlign:"right",direction:"rtl"};
  const B=(x={})=>({padding:"9px 14px",borderRadius:9,border:"1px solid "+T.bo,background:"transparent",cursor:"pointer",fontSize:14,color:T.tx,...x});
  const L={fontSize:12,color:T.sub,marginBottom:4,display:"block"};
  const S={background:T.st,border:"1px solid "+T.bo,borderRadius:12,padding:"0.8rem 1rem"};
  const MENU=PAGES.filter(p=>can(p.k));
  const pending=users.filter(u=>u.status==="pending");

  if(screen!=="main")return <Auth screen={screen} setScreen={setScreen} onLogin={login} T={T} tn={tn} setTn={setTn} users={users} setUsers={sUs}/>;
  if(syncing)return <div style={{background:T.bg,color:T.tx,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,fontFamily:"'Segoe UI',sans-serif"}}><div style={{fontSize:48}}>🌿</div><div style={{color:T.sub,fontSize:16}}>جاري المزامنة...</div></div>;

  return(
    <div style={{background:T.bg,color:T.tx,minHeight:"100vh",display:"flex",fontFamily:"'Segoe UI',Tahoma,sans-serif",direction:"rtl",position:"relative"}}>
      <div className={"overlay"+(sideOpen?" show":"")} onClick={()=>setSideOpen(false)}/>

      {/* شريط جانبي */}
      <div className={"sidebar"+(sideOpen?" open":"")} style={{width:200,background:T.sb,borderLeft:"1px solid "+T.sbb,display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{padding:"1rem",borderBottom:"1px solid "+T.sbb}}>
          <div style={{fontWeight:700,fontSize:13,background:"linear-gradient(90deg,"+T.ac+","+T.gr+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🌿 {STORE}</div>
          <div style={{fontSize:11,color:T.sub,marginTop:3}}>{user.name}</div>
          <span style={{fontSize:10,background:ROLES[user.role]?.color+"22",color:ROLES[user.role]?.color,borderRadius:6,padding:"2px 7px",fontWeight:600}}>{ROLES[user.role]?.label}</span>
        </div>
        <div style={{flex:1,padding:"0.4rem 0",overflowY:"auto"}}>

        {err&&<div style={{marginBottom:12,fontSize:13,color:T.rd,padding:"10px",background:T.rb,borderRadius:8,textAlign:"center"}}>{err}</div>}
        <button onClick={doLogin} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:T.ac,color:T.at,cursor:"pointer",fontSize:16,fontWeight:700,marginBottom:"0.75rem"}}>تسجيل الدخول</button>
        <button onClick={()=>{setScreen("register");setErr("");}} style={{width:"100%",padding:"11px",borderRadius:10,border:"1px solid "+T.bo,background:"transparent",color:T.sub,cursor:"pointer",fontSize:14}}>طلب انضمام جديد</button>
        <div style={{textAlign:"center",fontSize:11,color:T.sub,marginTop:"1rem"}}>👑 المدير: 07700000000 / admin123</div>
      </div>}
      {screen==="register"&&<div>
        {rOk?<div style={{textAlign:"center",padding:"1rem"}}>
          <div style={{fontSize:40,marginBottom:8}}>✅</div>
          <div style={{fontWeight:700,marginBottom:4}}>تم إرسال طلب الانضمام</div>
          <div style={{fontSize:13,color:T.sub,marginBottom:"1.25rem"}}>انتظر موافقة المدير</div>
          <button onClick={()=>{setScreen("login");setROk(false);}} style={{padding:"10px 24px",borderRadius:9,border:"none",background:T.ac,color:T.at,cursor:"pointer",fontSize:14,fontWeight:700}}>العودة</button>
        </div>:<div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
            <div><div style={{fontSize:12,color:T.sub,marginBottom:5}}>👤 الاسم الكامل</div><input value={rN} onChange={e=>setRN(e.target.value)} placeholder="أحمد محمد" style={I2}/></div>
            <div><div style={{fontSize:12,color:T.sub,marginBottom:5}}>📱 رقم الهاتف</div><input value={rPh} onChange={e=>setRPh(e.target.value)} placeholder="07X XXXX XXXX" style={I2}/></div>
            <div><div style={{fontSize:12,color:T.sub,marginBottom:5}}>💼 المسمى الوظيفي</div>
              <select value={rRo} onChange={e=>setRRo(e.target.value)} style={{...I2,cursor:"pointer"}}>
                {Object.entries(ROLES).filter(([k])=>k!=="admin").map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            <div><div style={{fontSize:12,color:T.sub,marginBottom:5}}>🔒 كلمة المرور</div><input type="password" value={rPa} onChange={e=>setRPa(e.target.value)} placeholder="••••••••" style={I2}/></div>
            <div><div style={{fontSize:12,color:T.sub,marginBottom:5}}>🔒 تأكيد كلمة المرور</div><input type="password" value={rPa2} onChange={e=>setRPa2(e.target.value)} placeholder="••••••••" style={I2}/></div>
          </div>
          {rErr&&<div style={{marginBottom:12,fontSize:13,color:T.rd,padding:"10px",background:T.rb,borderRadius:8,textAlign:"center"}}>{rErr}</div>}
          <button onClick={doReg} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:T.ac,color:T.at,cursor:"pointer",fontSize:15,fontWeight:700,marginBottom:"0.75rem"}}>إرسال طلب الانضمام</button>
          <button onClick={()=>{setScreen("login");setRErr("");}} style={{width:"100%",padding:"11px",borderRadius:10,border:"1px solid "+T.bo,background:"transparent",color:T.sub,cursor:"pointer",fontSize:14}}>العودة</button>
        </div>}
      </div>}
      <div style={{display:"flex",gap:5,justifyContent:"center",marginTop:"1.25rem"}}>
        {Object.entries(T_).map(([k,v])=><button key={k} onClick={()=>setTn(k)} style={{padding:"4px 10px",borderRadius:12,border:"1px solid "+(k===tn?T.ac:T.bo),background:k===tn?T.ac:"transparent",color:k===tn?T.at:T.sub,cursor:"pointer",fontSize:12}}>{v.n}</button>)}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
