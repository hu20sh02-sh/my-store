<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>متجر الفيب والشيشة</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:#444;border-radius:3px;}
input:focus,select:focus,textarea:focus{outline:2px solid #6c63ff;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

const API="https://script.google.com/macros/s/AKfycbwgpvKIS5nK3j8c1ATj7OalqvAiij9mxjP9KrT-kSUBnuhG0rQFnlc-zheqQumei2BR/exec";
const STORE_NAME="متجر الفيب والشيشة";
const CATS=["جهاز فيب","سائل إلكتروني","شيشة","معسل","فحم","إكسسوارات","أخرى"];

const ROLES={
  admin:{label:"مدير",color:"#6c63ff",defaultPerms:["dashboard","inventory","addProduct","sales","purchases","reports","accounts","notes","users"]},
  accountant:{label:"محاسب",color:"#22c55e",defaultPerms:["dashboard","accounts","reports","sales"]},
  warehouse:{label:"موظف مخزن",color:"#f59e0b",defaultPerms:["dashboard","inventory","addProduct"]},
  staff:{label:"موظف",color:"#8b8fa8",defaultPerms:["dashboard","inventory","sales"]},
};

const ALL_PAGES=[
  {k:"dashboard",l:"🏠 الرئيسية"},
  {k:"inventory",l:"📦 المخزن"},
  {k:"addProduct",l:"➕ إضافة مادة"},
  {k:"sales",l:"📊 سجل المبيعات"},
  {k:"purchases",l:"🛒 قائمة الشراء"},
  {k:"reports",l:"📈 التقارير"},
  {k:"accounts",l:"💰 الحسابات"},
  {k:"notes",l:"📝 ملاحظات"},
  {k:"users",l:"👥 المستخدمون"},
];

const DEFAULT_ADMIN={id:"1",name:"المدير",phone:"07700000000",password:"admin123",role:"admin",status:"approved",perms:ROLES.admin.defaultPerms};
function getUsers(){try{return JSON.parse(localStorage.getItem("vape_users")||JSON.stringify([DEFAULT_ADMIN]));}catch{return[DEFAULT_ADMIN];}}
function saveUsers(u){localStorage.setItem("vape_users",JSON.stringify(u));}

const THEMES={
  dark:{name:"🌙 داكن",bg:"#0f1117",card:"#1a1d27",border:"#2a2d3a",text:"#e8eaf0",sub:"#8b8fa8",accent:"#6c63ff",accentText:"#fff",green:"#22c55e",greenBg:"rgba(34,197,94,0.12)",red:"#ef4444",redBg:"rgba(239,68,68,0.12)",amber:"#f59e0b",amberBg:"rgba(245,158,11,0.12)",input:"#12151f",statBg:"#12151f",sidebar:"#13151f",sidebarBorder:"#22253a",sellBtn:"#22c55e",sellBtnTxt:"#fff"},
  light:{name:"☀️ فاتح",bg:"#f4f6fb",card:"#ffffff",border:"#dde2f0",text:"#1a1d2e",sub:"#6b7280",accent:"#4f46e5",accentText:"#fff",green:"#16a34a",greenBg:"#dcfce7",red:"#dc2626",redBg:"#fee2e2",amber:"#b45309",amberBg:"#fef3c7",input:"#f9fafb",statBg:"#eef1f8",sidebar:"#ffffff",sidebarBorder:"#dde2f0",sellBtn:"#16a34a",sellBtnTxt:"#fff"},
  gold:{name:"✨ ذهبي",bg:"#1a1400",card:"#221c00",border:"#3d3200",text:"#ffe98a",sub:"#9e8c4a",accent:"#f5c518",accentText:"#000",green:"#a3e635",greenBg:"rgba(163,230,53,0.12)",red:"#f87171",redBg:"rgba(248,113,113,0.12)",amber:"#fb923c",amberBg:"rgba(251,146,60,0.12)",input:"#120f00",statBg:"#120f00",sidebar:"#120f00",sidebarBorder:"#3d3200",sellBtn:"#f5c518",sellBtnTxt:"#000"},
};

async function api(params){try{const r=await fetch(API+"?"+new URLSearchParams(params));return r.json();}catch{return{ok:false};}}
async function apiPost(body){try{const r=await fetch(API,{method:"POST",body:JSON.stringify(body)});return r.json();}catch{return{ok:false};}}

const emptyForm={name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:""};
const emptyCust={name:"",phone:"",note:""};
const emptyPO={supplierName:"",date:new Date().toLocaleDateString("ar-IQ"),notes:"",discount:"0",items:[{name:"",qty:"1",price:""}]};

function App(){
  const[user,setUser]=useState(()=>{try{const u=localStorage.getItem("vape_session");return u?JSON.parse(u):null;}catch{return null;}});
  const[screen,setScreen]=useState(()=>localStorage.getItem("vape_session")?"main":"login");
  const[themeName,setThemeName]=useState(()=>localStorage.getItem("vape_theme")||"dark");
  const[products,setProducts]=useState([]);
  const[sales,setSales]=useState([]);
  const[notes,setNotes]=useState("");
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState("");
  const[page,setPage]=useState("dashboard");
  const[search,setSearch]=useState("");
  const[filterCat,setFilterCat]=useState("الكل");
  const[editId,setEditId]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[form,setForm]=useState(emptyForm);
  const[formErr,setFormErr]=useState("");
  const[saleModal,setSaleModal]=useState(null);
  const[saleQty,setSaleQty]=useState(1);
  const[cust,setCust]=useState(emptyCust);
  const[custErr,setCustErr]=useState("");
  const[salesSearch,setSalesSearch]=useState("");
  const[expandedSale,setExpandedSale]=useState(null);
  const[po,setPo]=useState(emptyPO);
  const[purchaseOrders,setPurchaseOrders]=useState(()=>{try{return JSON.parse(localStorage.getItem("vape_po")||"[]");}catch{return[];}});
  const[printInvoice,setPrintInvoice]=useState(null);
  const[users,setUsers]=useState(getUsers);
  const T=THEMES[themeName];

  useEffect(()=>{localStorage.setItem("vape_theme",themeName);},[themeName]);
  useEffect(()=>{localStorage.setItem("vape_po",JSON.stringify(purchaseOrders));},[purchaseOrders]);
  useEffect(()=>{saveUsers(users);},[users]);

  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{const res=await api({action:"getAll"});if(res&&res.ok){setProducts(res.data.products||[]);setSales(res.data.sales||[]);setNotes(res.data.notes||"");}}catch(e){}
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)loadAll();},[user]);

  const can=(p)=>user?.perms?.includes(p);
  const isAdmin=user?.role==="admin";

  function login(u){setUser(u);localStorage.setItem("vape_session",JSON.stringify(u));setScreen("main");}
  function logout(){setUser(null);localStorage.removeItem("vape_session");setScreen("login");setPage("dashboard");}
  function refreshUser(u){setUser(u);localStorage.setItem("vape_session",JSON.stringify(u));}

  async function handleAdd(){
    if(!form.name.trim()){setFormErr("يرجى إدخال اسم المنتج");return;}
    if(form.buyPrice===""||isNaN(+form.buyPrice)||+form.buyPrice<0){setFormErr("يرجى إدخال سعر الشراء");return;}
    if(form.sellPrice===""||isNaN(+form.sellPrice)||+form.sellPrice<0){setFormErr("يرجى إدخال سعر البيع");return;}
    if(form.quantity===""||isNaN(+form.quantity)||+form.quantity<0){setFormErr("يرجى إدخال الكمية");return;}
    setSaving("جاري الحفظ...");
    const p={name:form.name.trim(),category:form.category,buyPrice:parseFloat(form.buyPrice),sellPrice:parseFloat(form.sellPrice),quantity:parseInt(form.quantity),sku:form.sku.trim(),addedDate:new Date().toLocaleDateString("ar-IQ")};
    try{
      const res=await apiPost({action:"saveProduct",product:p});
      const saved=res&&res.ok&&res.data?res.data:{...p,id:Date.now()};
      setProducts(prev=>[...prev,saved]);
      setForm(emptyForm);setFormErr("");setPage("inventory");
    }catch{const saved={...p,id:Date.now()};setProducts(prev=>[...prev,saved]);setForm(emptyForm);setFormErr("");setPage("inventory");}
    setSaving("");
  }

  async function saveEdit(id){
    setSaving("جاري الحفظ...");
    const p={...editForm,id,buyPrice:parseFloat(editForm.buyPrice),sellPrice:parseFloat(editForm.sellPrice),quantity:parseInt(editForm.quantity)};
    await apiPost({action:"updateProduct",product:p});
    setProducts(prev=>prev.map(x=>String(x.id)===String(id)?{...x,...p}:x));
    setEditId(null);setSaving("");
  }

  async function deleteProduct(id){
    if(!confirm("هل تريد حذف هذا المنتج؟"))return;
    await apiPost({action:"deleteProduct",id});
    setProducts(prev=>prev.filter(p=>String(p.id)!==String(id)));
  }

  async function adjustQty(id,d){
    const prod=products.find(p=>String(p.id)===String(id));if(!prod)return;
    const updated={...prod,quantity:Math.max(0,prod.quantity+d)};
    setProducts(prev=>prev.map(p=>String(p.id)===String(id)?updated:p));
    await apiPost({action:"updateProduct",product:updated});
  }

  async function confirmSale(){
    if(!cust.name.trim()){setCustErr("يرجى إدخال اسم الزبون");return;}
    setSaving("جاري تسجيل البيع...");
    const prod=saleModal;
    const sale={saleId:Date.now(),productId:prod.id,productName:prod.name,category:prod.category,sku:prod.sku||"",qty:saleQty,buyPrice:prod.buyPrice,sellPrice:prod.sellPrice,total:+(prod.sellPrice*saleQty).toFixed(2),profit:+((prod.sellPrice-prod.buyPrice)*saleQty).toFixed(2),customer:cust,soldBy:user.name,date:new Date().toLocaleDateString("ar-IQ"),time:new Date().toLocaleTimeString("ar-IQ",{hour:"2-digit",minute:"2-digit"})};
    const updatedProd={...prod,quantity:Math.max(0,prod.quantity-saleQty)};
    await apiPost({action:"updateProduct",product:updatedProd});
    await apiPost({action:"saveSale",sale});
    setProducts(prev=>prev.map(p=>String(p.id)===String(prod.id)?updatedProd:p));
    setSales(prev=>[sale,...prev]);
    setSaleModal(null);setSaleQty(1);setCust(emptyCust);setCustErr("");
    setPrintInvoice(sale);setSaving("");
  }

  async function deleteSale(saleId){
    if(!confirm("حذف هذا السجل؟"))return;
    await apiPost({action:"deleteSale",saleId});
    setSales(prev=>prev.filter(s=>String(s.saleId)!==String(saleId)));
  }

  async function handleSaveNotes(){
    setSaving("جاري الحفظ...");
    await apiPost({action:"saveNotes",notes});
    setSaving("تم ✓");setTimeout(()=>setSaving(""),2000);
  }

  function exportExcel(data,filename,headers,keys){
    const ws=XLSX.utils.json_to_sheet(data.map(r=>Object.fromEntries(keys.map((k,i)=>[headers[i],typeof r[k]==="object"?JSON.stringify(r[k]):r[k]]))));
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"data");
    XLSX.writeFile(wb,filename+".xlsx");
  }

  function printHTML(html){
    const w=window.open("","_blank");
    w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;padding:24px;color:#111;}h2,h3{text-align:center;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #ccc;padding:8px;text-align:right;font-size:13px;}th{background:#f0f0f0;}.ttl{font-weight:700;font-size:15px;margin-top:10px;}</style></head><body>${html}</body></html>`);
    w.document.close();w.print();
  }

  function invoiceHTML(sale){
    return`<h2>${STORE_NAME}</h2><h3>فاتورة مبيعات</h3><p style="text-align:center">${sale.date} · ${sale.time}</p><p style="text-align:center">الزبون: <b>${sale.customer.name}</b>${sale.customer.phone?" | "+sale.customer.phone:""}</p><table><thead><tr><th>المنتج</th><th>الكمية</th><th>سعر البيع</th><th>الإجمالي</th></tr></thead><tbody><tr><td>${sale.productName}</td><td>${sale.qty}</td><td>$${(sale.sellPrice||0).toFixed(2)}</td><td>$${sale.total.toFixed(2)}</td></tr></tbody></table><p class="ttl">المجموع: $${sale.total.toFixed(2)}</p>${sale.customer.note?`<p>ملاحظة: ${sale.customer.note}</p>`:""}`;
  }

  const poItemsTotal=po.items.reduce((s,i)=>s+(+i.price||0)*(+i.qty||0),0);
  const poFinal=Math.max(0,poItemsTotal-(+po.discount||0));

  function poHTML(o){
    const rows=o.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>$${(+i.price).toFixed(2)}</td><td>$${((+i.price)*(+i.qty)).toFixed(2)}</td></tr>`).join("");
    return`<h2>${STORE_NAME}</h2><h3>قائمة مشتريات</h3><p style="text-align:center">المجهز: ${o.supplierName} | ${o.date}</p><table><thead><tr><th>المادة</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${rows}</tbody></table>${o.notes?`<p>ملاحظات: ${o.notes}</p>`:""}<p class="ttl">الإجمالي: $${(o.itemsTotal||0).toFixed(2)} | خصم: $${(+o.discount||0).toFixed(2)} | الصافي: $${(o.total||0).toFixed(2)}</p>`;
  }

  const filtered=products.filter(p=>{const s=search.trim().toLowerCase();return(!s||p.name.toLowerCase().includes(s)||(p.sku||"").toLowerCase().includes(s))&&(filterCat==="الكل"||p.category===filterCat);});
  const filteredSales=sales.filter(r=>{const s=salesSearch.trim().toLowerCase();return!s||r.productName.toLowerCase().includes(s)||(r.customer?.name||"").includes(s)||(r.customer?.phone||"").includes(s);});
  const totalInv=products.reduce((s,p)=>s+(p.sellPrice||0)*p.quantity,0);
  const totalCost=products.reduce((s,p)=>s+(p.buyPrice||0)*p.quantity,0);
  const totalUnits=products.reduce((s,p)=>s+p.quantity,0);
  const totalRev=sales.reduce((s,r)=>s+r.total,0);
  const totalProfit=sales.reduce((s,r)=>s+(r.profit||0),0);
  const sqC=q=>q===0?T.red:q<=3?T.amber:T.green;
  const sqB=q=>q===0?T.redBg:q<=3?T.amberBg:T.greenBg;
  const card={background:T.card,border:"1px solid "+T.border,borderRadius:14};
  const inp={padding:"9px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.input,color:T.text,fontSize:14,width:"100%",boxSizing:"border-box",textAlign:"right",direction:"rtl"};
  const btn=(x={})=>({padding:"8px 14px",borderRadius:8,border:"1px solid "+T.border,background:"transparent",cursor:"pointer",fontSize:13,color:T.text,...x});
  const lbl={fontSize:11,color:T.sub,marginBottom:4,display:"block"};
  const sc={background:T.statBg,border:"1px solid "+T.border,borderRadius:12,padding:"0.75rem 1rem"};
  const MENU=ALL_PAGES.filter(p=>can(p.k));

  if(screen==="login"||screen==="register")
    return <AuthScreen screen={screen} setScreen={setScreen} onLogin={login} T={T} themeName={themeName} setThemeName={setThemeName} users={users} setUsers={setUsers}/>;

  if(loading)return(<div style={{background:T.bg,color:T.text,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,fontFamily:"'Segoe UI',sans-serif"}}><div style={{fontSize:44}}>🌿</div><div style={{color:T.sub}}>جاري تحميل البيانات...</div></div>);

  return(
    <div style={{background:T.bg,color:T.text,minHeight:"100vh",display:"flex",fontFamily:"'Segoe UI',Tahoma,sans-serif",direction:"rtl"}}>
      <div style={{width:195,minHeight:"100vh",background:T.sidebar,borderLeft:"1px solid "+T.sidebarBorder,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
        <div style={{padding:"1rem",borderBottom:"1px solid "+T.sidebarBorder}}>
          <div style={{fontWeight:700,fontSize:13,background:"linear-gradient(90deg,"+T.accent+","+T.green+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🌿 {STORE_NAME}</div>
          <div style={{fontSize:11,color:T.sub,marginTop:3}}>{user.name}</div>
          <span style={{fontSize:10,background:ROLES[user.role]?.color+"22",color:ROLES[user.role]?.color,borderRadius:6,padding:"2px 7px",fontWeight:600}}>{ROLES[user.role]?.label}</span>
        </div>
        <div style={{flex:1,padding:"0.5rem 0"}}>
          {MENU.map(m=>(<button key={m.k} onClick={()=>setPage(m.k)} style={{display:"block",width:"100%",textAlign:"right",padding:"10px 1rem",border:"none",background:page===m.k?T.accent+"20":"transparent",color:page===m.k?T.accent:T.sub,cursor:"pointer",fontSize:13,fontWeight:page===m.k?700:400,borderRight:page===m.k?"3px solid "+T.accent:"3px solid transparent"}}>{m.l}</button>))}
        </div>
        <div style={{padding:"0.75rem",borderTop:"1px solid "+T.sidebarBorder}}>
          <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
            {Object.entries(THEMES).map(([k,v])=>(<button key={k} onClick={()=>setThemeName(k)} style={{padding:"3px 7px",borderRadius:10,border:"1px solid "+(k===themeName?T.accent:T.border),background:k===themeName?T.accent:"transparent",color:k===themeName?T.accentText:T.sub,cursor:"pointer",fontSize:10}}>{v.name}</button>))}
          </div>
          <button onClick={loadAll} style={{...btn({width:"100%",marginBottom:6,padding:"7px",fontSize:12,color:T.accent,borderColor:T.accent})}}>🔄 تحديث</button>
          <button onClick={logout} style={{...btn({width:"100%",color:T.red,borderColor:T.redBg,padding:"7px",fontSize:12})}}>🚪 خروج</button>
        </div>
      </div>

      <div style={{flex:1,padding:"1.25rem",overflowY:"auto",maxHeight:"100vh"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
          <h2 style={{fontSize:17,fontWeight:700}}>{MENU.find(m=>m.k===page)?.l||""}</h2>
          {saving&&<span style={{fontSize:12,color:T.amber}}>⏳ {saving}</span>}
        </div>

        {page==="dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
              {[["📦 قيمة المخزون","$"+totalInv.toFixed(2),T.accent],isAdmin&&["💸 تكلفة المخزون","$"+totalCost.toFixed(2),T.sub],[products.length+" صنف · "+totalUnits+" وحدة","🗂 المواد",T.text],["💰 إيراد المبيعات","$"+totalRev.toFixed(2),T.green],isAdmin&&["📈 صافي الربح","$"+totalProfit.toFixed(2),totalProfit>=0?T.green:T.red],["⚠️ مخزون منخفض",products.filter(p=>p.quantity<=3).length+" صنف",T.amber]].filter(Boolean).map(([l,v,c])=>(<div key={l} style={sc}><div style={{fontSize:11,color:T.sub,marginBottom:3}}>{l}</div><div style={{fontSize:15,fontWeight:700,color:c}}>{v}</div></div>))}
            </div>
            {products.filter(p=>p.quantity<=3).length>0&&(<div style={{...card,padding:"1rem",marginBottom:"1rem",borderColor:T.amber}}><div style={{fontWeight:700,color:T.amber,marginBottom:8}}>⚠️ تحتاج إعادة تخزين</div>{products.filter(p=>p.quantity<=3).map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+T.border,fontSize:13}}><span>{p.name}</span><span style={{color:sqC(p.quantity),fontWeight:700}}>{p.quantity} وحدة</span></div>))}</div>)}
            <div style={{...card,padding:"1rem"}}><div style={{fontWeight:700,marginBottom:8}}>🕐 آخر المبيعات</div>{sales.slice(0,5).map(r=>(<div key={r.saleId} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+T.border,fontSize:13}}><span>{r.productName} — {r.customer?.name}</span><span style={{color:T.green,fontWeight:700}}>${r.total.toFixed(2)}</span></div>))}</div>
          </div>
        )}

        {page==="inventory"&&(<>
          <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
            <input placeholder="ابحث..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,flex:1}}/>
            <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{...inp,width:140,cursor:"pointer"}}><option>الكل</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
          </div>
          {can("reports")&&(<div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
            <button onClick={()=>exportExcel(products,"المخزون",["الاسم","التصنيف","سعر الشراء","سعر البيع","الكمية"],["name","category","buyPrice","sellPrice","quantity"])} style={btn({fontSize:12,padding:"6px 12px",color:T.green,borderColor:T.greenBg})}>📥 Excel</button>
            <button onClick={()=>printHTML(`<h2>${STORE_NAME}</h2><h3>تقرير المخزون</h3><table><thead><tr><th>الاسم</th><th>التصنيف</th><th>سعر البيع</th><th>الكمية</th></tr></thead><tbody>${products.map(p=>`<tr><td>${p.name}</td><td>${p.category}</td><td>$${(p.sellPrice||0).toFixed(2)}</td><td>${p.quantity}</td></tr>`).join("")}</tbody></table>`)} style={btn({fontSize:12,padding:"6px 12px",color:T.red,borderColor:T.redBg})}>📄 PDF</button>
          </div>)}
          {filtered.length===0?(<div style={{...card,textAlign:"center",padding:"3rem",color:T.sub}}>لا توجد منتجات.</div>):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(p=>(<div key={p.id} style={card}>
                {editId===String(p.id)?(<div style={{padding:"1rem"}}>
                  <div style={{fontWeight:700,marginBottom:10,color:T.accent}}>تعديل: {p.name}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div style={{gridColumn:"1/-1"}}><span style={lbl}>الاسم</span><input value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} style={inp}/></div>

          <div style={{fontWeight:700,fontSize:17,color:T.accent,marginBottom:4}}>💰 تسجيل بيع</div>
          <div style={{fontSize:13,color:T.sub,marginBottom:"1rem",paddingBottom:"1rem",borderBottom:"1px solid "+T.border}}><b style={{color:T.text}}>{saleModal.name}</b> · المتوفر: <b style={{color:T.green}}>{saleModal.quantity}</b></div>
          <div style={{marginBottom:"1rem"}}><span style={lbl}>الكمية</span><input type="number" min={1} max={saleModal.quantity} value={saleQty} onChange={e=>setSaleQty(Math.max(1,Math.min(saleModal.quantity,parseInt(e.target.value)||1)))} style={{...inp,fontSize:15,fontWeight:700}}/></div>
          <div style={{background:T.statBg,borderRadius:9,padding:"10px 12px",marginBottom:"1rem",fontSize:13}}>
            {[["سعر البيع","$"+(saleModal.sellPrice||0).toFixed(2),T.green],["الإجمالي","$"+((saleModal.sellPrice||0)*saleQty).toFixed(2),T.accent],["الكمية بعد البيع",(saleModal.quantity-saleQty)+" وحدة",sqC(saleModal.quantity-saleQty)]].map(([l,v,c],i,a)=>(<div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:i<a.length-1?5:0,paddingBottom:i<a.length-1?5:0,borderBottom:i<a.length-1?"1px solid "+T.border:"none"}}><span style={{color:T.sub}}>{l}</span><b style={{color:c}}>{v}</b></div>))}
          </div>
          <div style={{fontWeight:700,fontSize:13,color:T.accent,marginBottom:8}}>👤 الزبون</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:"1rem"}}>
            <div><span style={lbl}>الاسم *</span><input value={cust.name} onChange={e=>setCust(c=>({...c,name:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>الهاتف</span><input value={cust.phone} onChange={e=>setCust(c=>({...c,phone:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>ملاحظة</span><input value={cust.note} onChange={e=>setCust(c=>({...c,note:e.target.value}))} style={inp}/></div>
          </div>
          {custErr&&<div style={{marginBottom:10,fontSize:13,color:T.red,padding:"8px",background:T.redBg,borderRadius:7}}>{custErr}</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={confirmSale} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:T.sellBtn,color:T.sellBtnTxt,cursor:"pointer",fontSize:14,fontWeight:700}}>✅ تأكيد</button>
            <button onClick={()=>setSaleModal(null)} style={btn({flex:1,color:T.sub,padding:"10px"})}>إلغاء</button>
          </div>
        </div>
      </div>)}

      {printInvoice&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:"1rem"}}>
        <div style={{...card,padding:"1.75rem",width:"100%",maxWidth:360}}>
          <div style={{fontWeight:700,fontSize:15,color:T.green,marginBottom:"1rem"}}>✅ تم البيع بنجاح</div>
          <div style={{fontSize:13,marginBottom:"1.25rem",color:T.sub}}><b style={{color:T.text}}>{printInvoice.productName}</b> · {printInvoice.qty} وحدة · <b style={{color:T.accent}}>${printInvoice.total.toFixed(2)}</b></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{printHTML(invoiceHTML(printInvoice));setPrintInvoice(null);}} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:13,fontWeight:700}}>🖨️ طباعة فاتورة</button>
            <button onClick={()=>setPrintInvoice(null)} style={btn({flex:1,color:T.sub,padding:"9px"})}>تخطي</button>
          </div>
        </div>
      </div>)}
    </div>
  );
}

function UsersManager({T,users,setUsers,user,refreshUser,btn,lbl,inp,card}){
  const[tab,setTab]=useState("list");
  const[editU,setEditU]=useState(null);
  const pending=users.filter(u=>u.status==="pending");
  function approveUser(id){setUsers(prev=>prev.map(u=>u.id===id?{...u,status:"approved"}:u));}
  function rejectUser(id){if(!confirm("رفض الطلب وحذفه؟"))return;setUsers(prev=>prev.filter(u=>u.id!==id));}
  function deleteUser(id){if(!confirm("حذف هذا المستخدم؟"))return;setUsers(prev=>prev.filter(u=>u.id!==id));}
  function saveUserEdit(){setUsers(prev=>prev.map(u=>u.id===editU.id?editU:u));if(editU.id===user.id)refreshUser(editU);setEditU(null);}
  const rc={admin:T.accent,accountant:T.green,warehouse:T.amber,staff:T.sub};
  return(<div>
    <div style={{display:"flex",gap:6,marginBottom:"1.25rem",flexWrap:"wrap"}}>
      {[["list","👥 المستخدمون"],["pending","⏳ طلبات الانضمام"+(pending.length>0?" ("+pending.length+")":"")]].map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} style={{padding:"8px 16px",borderRadius:9,border:"1px solid "+(tab===k?T.accent:T.border),background:tab===k?T.accent:"transparent",color:tab===k?T.accentText:T.sub,cursor:"pointer",fontSize:13,fontWeight:tab===k?700:400}}>{l}</button>))}
    </div>
    {tab==="list"&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
      {users.filter(u=>u.status==="approved").map(u=>(<div key={u.id} style={{...card,padding:"1rem"}}>
        {editU?.id===u.id?(<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><span style={lbl}>الاسم</span><input value={editU.name} onChange={e=>setEditU(x=>({...x,name:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>رقم الهاتف</span><input value={editU.phone} onChange={e=>setEditU(x=>({...x,phone:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>كلمة المرور</span><input value={editU.password} onChange={e=>setEditU(x=>({...x,password:e.target.value}))} style={inp}/></div>
            <div><span style={lbl}>الدور</span><select value={editU.role} onChange={e=>setEditU(x=>({...x,role:e.target.value,perms:ROLES[e.target.value].defaultPerms}))} style={{...inp,cursor:"pointer"}}>{Object.entries(ROLES).map(([k,v])=>(<option key={k} value={k}>{v.label}</option>))}</select></div>
          </div>
          <div style={{marginBottom:10}}>
            <span style={lbl}>الصلاحيات</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ALL_PAGES.map(p=>(<label key={p.k} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer",background:T.statBg,borderRadius:6,padding:"4px 8px",border:"1px solid "+(editU.perms.includes(p.k)?T.accent:T.border)}}>
                <input type="checkbox" checked={editU.perms.includes(p.k)} onChange={e=>setEditU(x=>({...x,perms:e.target.checked?[...x.perms,p.k]:x.perms.filter(pp=>pp!==p.k)}))} style={{accentColor:T.accent}}/>{p.l}
              </label>))}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveUserEdit} style={btn({flex:1,fontWeight:700,border:"1px solid "+T.accent,color:T.accent})}>حفظ</button>
            <button onClick={()=>setEditU(null)} style={btn({flex:1,color:T.sub})}>إلغاء</button>
          </div>
        </div>):(<div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{u.name}</div><div style={{fontSize:12,color:T.sub}}>{u.phone}</div></div>
          <span style={{fontSize:11,background:rc[u.role]+"22",color:rc[u.role],borderRadius:6,padding:"3px 9px",fontWeight:700}}>{ROLES[u.role]?.label}</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setEditU({...u})} style={btn({fontSize:12,padding:"5px 10px"})}>✏️ تعديل</button>
            {u.id!==user.id&&<button onClick={()=>deleteUser(u.id)} style={btn({fontSize:12,padding:"5px 10px",color:T.red,borderColor:T.redBg})}>🗑</button>}
          </div>
        </div>)}
      </div>))}
    </div>)}
    {tab==="pending"&&(<div>
      {pending.length===0?(<div style={{...card,textAlign:"center",padding:"3rem",color:T.sub}}>لا توجد طلبات انضمام.</div>):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {pending.map(u=>(<div key={u.id} style={{...card,padding:"1rem",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:1}}><div style={{fontWeight:700}}>{u.name}</div><div style={{fontSize:12,color:T.sub}}>{u.phone} · {ROLES[u.role]?.label}</div></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>approveUser(u.id)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:T.green,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>✅ قبول</button>
              <button onClick={()=>rejectUser(u.id)} style={btn({color:T.red,borderColor:T.redBg,padding:"6px 14px",fontSize:13})}>❌ رفض</button>
            </div>
          </div>))}
        </div>
      )}
    </div>)}
  </div>);
}

function AuthScreen({screen,setScreen,onLogin,T,themeName,setThemeName,users,setUsers}){
  const[phone,setPhone]=useState("");
  const[pass,setPass]=useState("");
  const[showPass,setShowPass]=useState(false);
  const[err,setErr]=useState("");
  const[rName,setRName]=useState("");
  const[rPhone,setRPhone]=useState("");
  const[rRole,setRRole]=useState("staff");
  const[rPass,setRPass]=useState("");
  const[rPass2,setRPass2]=useState("");
  const[rErr,setRErr]=useState("");
  const[rOk,setROk]=useState(false);

  function handleLogin(){
    if(!phone.trim()||!pass.trim()){setErr("يرجى إدخال رقم الهاتف وكلمة المرور");return;}
    const found=users.find(u=>u.phone===phone.trim()&&u.password===pass);
    if(!found){setErr("رقم الهاتف أو كلمة المرور غير صحيحة");return;}
    if(found.status==="pending"){setErr("حسابك قيد المراجعة. انتظر موافقة المدير.");return;}
    onLogin(found);
  }

  function handleRegister(){
    if(!rName.trim()||!rPhone.trim()||!rPass.trim()){setRErr("يرجى إكمال جميع الحقول");return;}
    if(rPass!==rPass2){setRErr("كلمة المرور غير متطابقة");return;}
    if(users.find(u=>u.phone===rPhone.trim())){setRErr("رقم الهاتف مسجل مسبقاً");return;}
    const newUser={id:Date.now().toString(),name:rName.trim(),phone:rPhone.trim(),password:rPass,role:rRole,status:"pending",perms:ROLES[rRole].defaultPerms};
    setUsers(prev=>[...prev,newUser]);
    setROk(true);
  }

  const i2={padding:"10px 12px",borderRadius:9,border:"1px solid "+T.border,background:T.input,color:T.text,fontSize:14,width:"100%",boxSizing:"border-box",textAlign:"right",direction:"rtl"};

  return(<div style={{background:T.bg,color:T.text,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',Tahoma,sans-serif",direction:"rtl",padding:"1rem"}}>
    <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:18,padding:"2rem",width:"100%",maxWidth:400}}>
      <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
        <div style={{fontSize:44,marginBottom:6}}>🌿</div>
        <h2 style={{fontSize:19,fontWeight:700,background:"linear-gradient(90deg,"+T.accent+","+T.green+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>متجر الفيب والشيشة</h2>
        <p style={{fontSize:12,color:T.sub,marginTop:3}}>نظام إدارة المخزون والمبيعات</p>
      </div>
      {screen==="login"&&(<div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
          <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>📱 رقم الهاتف</div><input value={phone} onChange={e=>setPhone(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="07X XXXX XXXX" style={i2}/></div>
          <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>🔒 كلمة المرور</div>
            <div style={{position:"relative"}}>
              <input type={showPass?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••" style={{...i2,paddingLeft:36}}/>
              <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.sub,fontSize:14}}>{showPass?"🙈":"👁"}</button>
            </div>
          </div>
        </div>
        {err&&<div style={{marginBottom:10,fontSize:13,color:T.red,padding:"8px",background:T.redBg,borderRadius:7,textAlign:"center"}}>{err}</div>}
        <button onClick={handleLogin} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:15,fontWeight:700,marginBottom:"0.75rem"}}>تسجيل الدخول</button>
        <button onClick={()=>{setScreen("register");setErr("");}} style={{width:"100%",padding:"9px",borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.sub,cursor:"pointer",fontSize:13}}>طلب انضمام جديد</button>
        <div style={{textAlign:"center",fontSize:11,color:T.sub,marginTop:"1rem"}}>👑 المدير: 07700000000 / admin123</div>
      </div>)}
      {screen==="register"&&(<div>
        {rOk?(<div style={{textAlign:"center",padding:"1rem"}}>
          <div style={{fontSize:36,marginBottom:8}}>✅</div>
          <div style={{fontWeight:700,marginBottom:4}}>تم إرسال طلب الانضمام</div>
          <div style={{fontSize:13,color:T.sub,marginBottom:"1.25rem"}}>انتظر موافقة المدير على حسابك</div>
          <button onClick={()=>{setScreen("login");setROk(false);}} style={{padding:"9px 24px",borderRadius:9,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:13,fontWeight:700}}>العودة لتسجيل الدخول</button>
        </div>):(<div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>👤 الاسم الكامل</div><input value={rName} onChange={e=>setRName(e.target.value)} placeholder="أحمد محمد" style={i2}/></div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>📱 رقم الهاتف</div><input value={rPhone} onChange={e=>setRPhone(e.target.value)} placeholder="07X XXXX XXXX" style={i2}/></div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>💼 المسمى الوظيفي</div>
              <select value={rRole} onChange={e=>setRRole(e.target.value)} style={{...i2,cursor:"pointer"}}>
                {Object.entries(ROLES).filter(([k])=>k!=="admin").map(([k,v])=>(<option key={k} value={k}>{v.label}</option>))}
              </select>
            </div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>🔒 كلمة المرور</div><input type="password" value={rPass} onChange={e=>setRPass(e.target.value)} placeholder="••••••••" style={i2}/></div>
            <div><div style={{fontSize:11,color:T.sub,marginBottom:4}}>🔒 تأكيد كلمة المرور</div><input type="password" value={rPass2} onChange={e=>setRPass2(e.target.value)} placeholder="••••••••" style={i2}/></div>
          </div>
          {rErr&&<div style={{marginBottom:10,fontSize:13,color:T.red,padding:"8px",background:T.redBg,borderRadius:7,textAlign:"center"}}>{rErr}</div>}
          <button onClick={handleRegister} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:14,fontWeight:700,marginBottom:"0.75rem"}}>إرسال طلب الانضمام</button>
          <button onClick={()=>{setScreen("login");setRErr("");}} style={{width:"100%",padding:"9px",borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.sub,cursor:"pointer",fontSize:13}}>العودة</button>
        </div>)}
      </div>)}
      <div style={{display:"flex",gap:5,justifyContent:"center",marginTop:"1.25rem"}}>
        {Object.entries(THEMES).map(([k,v])=>(<button key={k} onClick={()=>setThemeName(k)} style={{padding:"3px 9px",borderRadius:12,border:"1px solid "+(k===themeName?T.accent:T.border),background:k===themeName?T.accent:"transparent",color:k===themeName?T.accentText:T.sub,cursor:"pointer",fontSize:11}}>{v.name}</button>))}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
