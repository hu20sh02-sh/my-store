<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>متجر الفيب والشيشة</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:#444;border-radius:3px;}
input:focus,select:focus,textarea:focus{outline:2px solid #6c63ff;}
@media print{.no-print{display:none!important;}.print-only{display:block!important;}}
.print-only{display:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const API = "https://script.google.com/macros/s/AKfycbwgpvKIS5nK3j8c1ATj7OalqvAiij9mxjP9KrT-kSUBnuhG0rQFnlc-zheqQumei2BR/exec";
const {useState,useEffect,useCallback,useRef}=React;

// ── المستخدمون الافتراضيون ──────────────────────────────
const DEFAULT_USERS = [
  {id:1, name:"المدير", username:"admin", phone:"07700000000", password:"admin123", role:"admin"},
  {id:2, name:"الموظف", username:"staff", phone:"07700000001", password:"staff123", role:"staff"},
];

const STORE_NAME = "متجر الفيب والشيشة";
const CATS = ["جهاز فيب","سائل إلكتروني","شيشة","معسل","فحم","إكسسوارات","أخرى"];

const THEMES = {
  dark:{name:"🌙 داكن",bg:"#0f1117",card:"#1a1d27",border:"#2a2d3a",text:"#e8eaf0",sub:"#8b8fa8",accent:"#6c63ff",accentText:"#fff",green:"#22c55e",greenBg:"rgba(34,197,94,0.12)",red:"#ef4444",redBg:"rgba(239,68,68,0.12)",amber:"#f59e0b",amberBg:"rgba(245,158,11,0.12)",input:"#12151f",statBg:"#12151f",tabActive:"#6c63ff",tabActiveTxt:"#fff",sellBtn:"#22c55e",sellBtnTxt:"#fff",sidebar:"#13151f",sidebarBorder:"#22253a"},
  light:{name:"☀️ فاتح",bg:"#f4f6fb",card:"#ffffff",border:"#dde2f0",text:"#1a1d2e",sub:"#6b7280",accent:"#4f46e5",accentText:"#fff",green:"#16a34a",greenBg:"#dcfce7",red:"#dc2626",redBg:"#fee2e2",amber:"#b45309",amberBg:"#fef3c7",input:"#f9fafb",statBg:"#eef1f8",tabActive:"#4f46e5",tabActiveTxt:"#fff",sellBtn:"#16a34a",sellBtnTxt:"#fff",sidebar:"#ffffff",sidebarBorder:"#dde2f0"},
  gold:{name:"✨ ذهبي",bg:"#1a1400",card:"#221c00",border:"#3d3200",text:"#ffe98a",sub:"#9e8c4a",accent:"#f5c518",accentText:"#000",green:"#a3e635",greenBg:"rgba(163,230,53,0.12)",red:"#f87171",redBg:"rgba(248,113,113,0.12)",amber:"#fb923c",amberBg:"rgba(251,146,60,0.12)",input:"#120f00",statBg:"#120f00",tabActive:"#f5c518",tabActiveTxt:"#000",sellBtn:"#f5c518",sellBtnTxt:"#000",sidebar:"#120f00",sidebarBorder:"#3d3200"},
};

async function api(params){try{const r=await fetch(API+"?"+new URLSearchParams(params));return r.json();}catch{return{ok:false};}}
async function apiPost(body){try{const r=await fetch(API,{method:"POST",body:JSON.stringify(body)});return r.json();}catch{return{ok:false};}}

const emptyForm={name:"",category:CATS[0],buyPrice:"",sellPrice:"",quantity:"",sku:""};
const emptyCust={name:"",phone:"",note:""};
const emptyPO={supplierName:"",date:new Date().toLocaleDateString("ar-IQ"),notes:"",discount:0,items:[{name:"",qty:1,price:""}]};

function App(){
  const[user,setUser]=useState(()=>{try{const u=localStorage.getItem("vape_user");return u?JSON.parse(u):null;}catch{return null;}});
  const[themeName,setThemeName]=useState(()=>localStorage.getItem("vape_theme")||"dark");
  const[products,setProducts]=useState([]);
  const[sales,setSales]=useState([]);
  const[purchaseOrders,setPurchaseOrders]=useState(()=>{try{return JSON.parse(localStorage.getItem("vape_po")||"[]");}catch{return[];}});
  const[notes,setNotes]=useState("");
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState("");
  const[page,setPage]=useState("dashboard");
  const[search,setSearch]=useState("");
  const[filterCat,setFilterCat]=useState("الكل");
  const[editId,setEditId]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[form,setForm]=useState(emptyForm);
  const[formErr,setFormErr]=useState("");
  const[saleModal,setSaleModal]=useState(null);
  const[saleQty,setSaleQty]=useState(1);
  const[cust,setCust]=useState(emptyCust);
  const[custErr,setCustErr]=useState("");
  const[salesSearch,setSalesSearch]=useState("");
  const[expandedSale,setExpandedSale]=useState(null);
  const[po,setPo]=useState(emptyPO);
  const[printInvoice,setPrintInvoice]=useState(null);
  const invoiceRef=useRef(null);
  const T=THEMES[themeName];

  useEffect(()=>{localStorage.setItem("vape_theme",themeName);},[themeName]);
  useEffect(()=>{localStorage.setItem("vape_po",JSON.stringify(purchaseOrders));},[purchaseOrders]);

  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{const res=await api({action:"getAll"});if(res.ok){setProducts(res.data.products||[]);setSales(res.data.sales||[]);setNotes(res.data.notes||"");}}
    catch{}
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)loadAll();},[user]);

  function login(u){setUser(u);localStorage.setItem("vape_user",JSON.stringify(u));}
  function logout(){setUser(null);localStorage.removeItem("vape_user");setPage("dashboard");}

  const isAdmin=user?.role==="admin";

  async function handleAdd(){
    if(!form.name.trim()){setFormErr("يرجى إدخال اسم المنتج");return;}
    if(!form.buyPrice||+form.buyPrice<0){setFormErr("يرجى إدخال سعر الشراء");return;}
    if(!form.sellPrice||+form.sellPrice<0){setFormErr("يرجى إدخال سعر البيع");return;}
    if(!form.quantity||+form.quantity<0){setFormErr("يرجى إدخال الكمية");return;}
    setSaving("جاري الحفظ...");
    const p={name:form.name.trim(),category:form.category,buyPrice:+form.buyPrice,sellPrice:+form.sellPrice,quantity:+form.quantity,sku:form.sku.trim(),addedDate:new Date().toLocaleDateString("ar-IQ")};
    const res=await apiPost({action:"saveProduct",product:p});
    if(res.ok){setProducts(prev=>[...prev,res.data]);setForm(emptyForm);setFormErr("");setPage("inventory");}
    setSaving("");
  }

  async function saveEdit(id){
    setSaving("جاري الحفظ...");
    const p={...editForm,id,buyPrice:+editForm.buyPrice,sellPrice:+editForm.sellPrice,quantity:+editForm.quantity};
    const res=await apiPost({action:"updateProduct",product:p});
    if(res.ok){setProducts(prev=>prev.map(x=>String(x.id)===String(id)?res.data:x));setEditId(null);}
    setSaving("");
  }

  async function deleteProduct(id){
    if(!confirm("هل تريد حذف هذا المنتج؟"))return;
    setSaving("جاري الحذف...");
    await apiPost({action:"deleteProduct",id});
    setProducts(prev=>prev.filter(p=>String(p.id)!==String(id)));
    setSaving("");
  }

  async function adjustQty(id,d){
    const prod=products.find(p=>String(p.id)===String(id));if(!prod)return;
    const updated={...prod,quantity:Math.max(0,prod.quantity+d)};
    setProducts(prev=>prev.map(p=>String(p.id)===String(id)?updated:p));
    await apiPost({action:"updateProduct",product:updated});
  }

  async function confirmSale(){
    if(!cust.name.trim()){setCustErr("يرجى إدخال اسم الزبون");return;}
    setSaving("جاري تسجيل البيع...");
    const prod=saleModal;
    const sale={saleId:Date.now(),productId:prod.id,productName:prod.name,category:prod.category,sku:prod.sku||"",qty:saleQty,buyPrice:prod.buyPrice,sellPrice:prod.sellPrice,total:+(prod.sellPrice*saleQty).toFixed(2),profit:+((prod.sellPrice-prod.buyPrice)*saleQty).toFixed(2),customer:cust,date:new Date().toLocaleDateString("ar-IQ"),time:new Date().toLocaleTimeString("ar-IQ",{hour:"2-digit",minute:"2-digit"})};
    const updatedProd={...prod,quantity:Math.max(0,prod.quantity-saleQty)};
    await apiPost({action:"updateProduct",product:updatedProd});
    const res=await apiPost({action:"saveSale",sale});
    if(res.ok){setProducts(prev=>prev.map(p=>String(p.id)===String(prod.id)?updatedProd:p));setSales(prev=>[sale,...prev]);}
    setSaleModal(null);setSaleQty(1);setCust(emptyCust);setCustErr("");
    setPrintInvoice(sale);
    setSaving("");
  }

  async function deleteSale(saleId){
    if(!confirm("هل تريد حذف هذا السجل؟"))return;
    await apiPost({action:"deleteSale",saleId});
    setSales(prev=>prev.filter(s=>String(s.saleId)!==String(saleId)));
  }

  async function handleSaveNotes(){
    setSaving("جاري حفظ الملاحظات...");
    await apiPost({action:"saveNotes",notes});
    setSaving("تم الحفظ ✓");setTimeout(()=>setSaving(""),2000);
  }

  // تصدير Excel
  function exportExcel(data,filename,headers,keys){
    const ws=XLSX.utils.json_to_sheet(data.map(r=>Object.fromEntries(keys.map((k,i)=>[headers[i],r[k]]))));
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"sheet1");
    XLSX.writeFile(wb,filename+".xlsx");
  }

  // طباعة
  function printDiv(html){
    const w=window.open("","_blank");
    w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;padding:20px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ccc;padding:8px;text-align:right;}th{background:#f0f0f0;}.header{text-align:center;margin-bottom:20px;}.total{font-weight:bold;font-size:16px;margin-top:10px;}</style></head><body>${html}</body></html>`);
    w.document.close();w.print();
  }

  function exportPDF(html){printDiv(html);}

  // PO
  const poTotal=po.items.reduce((s,i)=>s+(+i.price||0)*(+i.qty||0),0);
  const poFinal=Math.max(0,poTotal-(+po.discount||0));

  function addPOItem(){setPo(p=>({...p,items:[...p.items,{name:"",qty:1,price:""}]}));}
  function removePOItem(i){setPo(p=>({...p,items:p.items.filter((_,idx)=>idx!==i)}));}
  function updatePOItem(i,k,v){setPo(p=>({...p,items:p.items.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));}

  function savePO(){
    if(!po.supplierName.trim()||po.items.some(i=>!i.name.trim())){alert("يرجى إكمال بيانات قائمة الشراء");return;}
    const newPO={...po,id:Date.now(),total:poFinal};
    setPurchaseOrders(prev=>[newPO,...prev]);
    setPo(emptyPO);
    alert("تم حفظ قائمة الشراء ✓");
  }

  function getPOHtml(o){
    const rows=o.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>$${(+i.price).toFixed(2)}</td><td>$${((+i.price)*(+i.qty)).toFixed(2)}</td></tr>`).join("");
    return`<div class="header"><h2>${STORE_NAME}</h2><h3>قائمة مشتريات</h3><p>المجهز: ${o.supplierName} | التاريخ: ${o.date}</p></div><table><thead><tr><th>المادة</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${rows}</tbody></table>${o.notes?`<p>ملاحظات: ${o.notes}</p>`:""}<p class="total">الإجمالي: $${poTotal.toFixed(2)}</p><p class="total">الخصم: $${(+o.discount||0).toFixed(2)}</p><p class="total">الصافي: $${o.total.toFixed(2)}</p>`;
  }

  function getInvoiceHtml(sale){
    return`<div class="header"><h2>${STORE_NAME}</h2><h3>فاتورة مبيعات</h3><p>التاريخ: ${sale.date} | الوقت: ${sale.time}</p><p>الزبون: ${sale.customer.name}${sale.customer.phone?" | "+sale.customer.phone:""}</p></div><table><thead><tr><th>المنتج</th><th>الكمية</th><th>سعر البيع</th><th>الإجمالي</th></tr></thead><tbody><tr><td>${sale.productName}</td><td>${sale.qty}</td><td>$${(sale.sellPrice||0).toFixed(2)}</td><td>$${sale.total.toFixed(2)}</td></tr></tbody></table><p class="total">المجموع الكلي: $${sale.total.toFixed(2)}</p>${sale.customer.note?`<p>ملاحظة: ${sale.customer.note}</p>`:""}`;
  }

  const sqColor=q=>q===0?T.red:q<=3?T.amber:T.green;
  const sqBg=q=>q===0?T.redBg:q<=3?T.amberBg:T.greenBg;
  const cs={background:T.bg,color:T.text,minHeight:"100vh",fontFamily:"'Segoe UI',Tahoma,Arial,sans-serif",direction:"rtl",display:"flex"};
  const card={background:T.card,border:"1px solid "+T.border,borderRadius:14};
  const inp={padding:"9px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.input,color:T.text,fontSize:14,width:"100%",boxSizing:"border-box",textAlign:"right",direction:"rtl"};
  const b=(x={})=>({padding:"8px 14px",borderRadius:8,border:"1px solid "+T.border,background:"transparent",cursor:"pointer",fontSize:13,color:T.text,...x});
  const lbl={fontSize:11,color:T.sub,marginBottom:4,display:"block"};
  const sc={background:T.statBg,border:"1px solid "+T.border,borderRadius:12,padding:"0.8rem 1rem"};

  const totalInv=products.reduce((s,p)=>s+(p.sellPrice||0)*p.quantity,0);
  const totalCost=products.reduce((s,p)=>s+(p.buyPrice||0)*p.quantity,0);
  const totalUnits=products.reduce((s,p)=>s+p.quantity,0);
  const totalRev=sales.reduce((s,r)=>s+r.total,0);
  const totalProfit=sales.reduce((s,r)=>s+r.profit,0);

  const filtered=products.filter(p=>{const s=search.trim().toLowerCase();return(!s||p.name.includes(s)||(p.sku||"").toLowerCase().includes(s))&&(filterCat==="الكل"||p.category===filterCat);});
  const filteredSales=sales.filter(r=>{const s=salesSearch.trim().toLowerCase();return!s||r.productName.includes(s)||r.customer.name.includes(s)||(r.customer.phone||"").includes(s);});

  const MENU=[
    {k:"dashboard",l:"🏠 الرئيسية",roles:["admin","staff"]},
    {k:"inventory",l:"📦 المخزن",roles:["admin","staff"]},
    {k:"addProduct",l:"➕ إضافة مادة",roles:["admin"]},
    {k:"sales",l:"📊 سجل المبيعات",roles:["admin","staff"]},
    {k:"purchases",l:"🛒 قائمة الشراء",roles:["admin"]},
    {k:"reports",l:"📈 التقارير",roles:["admin"]},
    {k:"accounts",l:"💰 الحسابات",roles:["admin"]},
    {k:"notes",l:"📝 ملاحظات",roles:["admin"]},
  ].filter(m=>m.roles.includes(user?.role));

  // ── شاشة تسجيل الدخول ───────────────────────────────
  if(!user) return <LoginScreen onLogin={login} T={T} themeName={themeName} setThemeName={setThemeName}/>;

  if(loading) return(
    <div style={{...cs,alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:40}}>🌿</div>
      <div style={{fontSize:16,color:T.sub}}>جاري تحميل البيانات...</div>
    </div>
  );

  return(
    <div style={cs}>
      {/* الشريط الجانبي */}
      <div className="no-print" style={{width:200,minHeight:"100vh",background:T.sidebar,borderLeft:"1px solid "+T.sidebarBorder,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
        <div style={{padding:"1.25rem 1rem",borderBottom:"1px solid "+T.sidebarBorder}}>
          <div style={{fontWeight:700,fontSize:14,background:"linear-gradient(90deg,"+T.accent+","+T.green+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🌿 {STORE_NAME}</div>
          <div style={{fontSize:11,color:T.sub,marginTop:4}}>{user.name} · {user.role==="admin"?"مدير":"موظف"}</div>
        </div>
        <div style={{flex:1,padding:"0.75rem 0"}}>
          {MENU.map(m=>(
            <button key={m.k} onClick={()=>setPage(m.k)} style={{display:"block",width:"100%",textAlign:"right",padding:"10px 1rem",border:"none",background:page===m.k?T.accent+"22":"transparent",color:page===m.k?T.accent:T.sub,cursor:"pointer",fontSize:13,fontWeight:page===m.k?700:400,borderRight:page===m.k?"3px solid "+T.accent:"3px solid transparent"}}>
              {m.l}
            </button>
          ))}
        </div>
        <div style={{padding:"0.75rem 1rem",borderTop:"1px solid "+T.sidebarBorder}}>
          <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
            {Object.entries(THEMES).map(([k,v])=>(<button key={k} onClick={()=>setThemeName(k)} style={{padding:"3px 8px",borderRadius:12,border:"1px solid "+(k===themeName?T.accent:T.border),background:k===themeName?T.accent:"transparent",color:k===themeName?T.accentText:T.sub,cursor:"pointer",fontSize:11}}>{v.name}</button>))}
          </div>
          <button onClick={logout} style={{...b({width:"100%",color:T.red,borderColor:T.redBg,padding:"7px"})}}>🚪 تسجيل الخروج</button>
        </div>
      </div>

      {/* المحتوى الرئيسي */}
      <div style={{flex:1,padding:"1.25rem",overflowY:"auto",maxHeight:"100vh"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
          <h2 style={{fontSize:18,fontWeight:700,color:T.text}}>{MENU.find(m=>m.k===page)?.l||"الرئيسية"}</h2>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {saving&&<span style={{fontSize:12,color:T.amber}}>⏳ {saving}</span>}
            <button onClick={loadAll} style={b({padding:"6px 12px",border:"1px solid "+T.accent,color:T.accent,fontSize:12})}>🔄 تحديث</button>
          </div>
        </div>

        {/* ── الرئيسية ── */}
        {page==="dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.25rem"}}>
              {[
                ["📦 قيمة المخزون","$"+totalInv.toFixed(2),T.accent],
                ["💸 تكلفة المخزون","$"+totalCost.toFixed(2),T.sub],
                [products.length+" صنف · "+totalUnits+" وحدة","🗂 المواد",T.text],
                ["💰 إيراد المبيعات","$"+totalRev.toFixed(2),T.green],
                ["📈 صافي الربح","$"+totalProfit.toFixed(2),totalProfit>=0?T.green:T.red],
                ["⚠️ مخزون منخفض",products.filter(p=>p.quantity>0&&p.quantity<=3).length+" صنف",T.amber],
              ].map(([l,v,c])=>(<div key={l} style={sc}><div style={{fontSize:11,color:T.sub,marginBottom:4}}>{l}</div><div style={{fontSize:16,fontWeight:700,color:c}}>{v}</div></div>))}
            </div>
            {products.filter(p=>p.quantity<=3).length>0&&(
              <div style={{...card,padding:"1rem",marginBottom:"1rem",borderColor:T.amber}}>
                <div style={{fontWeight:700,color:T.amber,marginBottom:8}}>⚠️ منتجات تحتاج إعادة تخزين</div>
                {products.filter(p=>p.quantity<=3).map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+T.border,fontSize:13}}>
                    <span>{p.name}</span>
                    <span style={{color:sqColor(p.quantity),fontWeight:700}}>{p.quantity} وحدة</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{...card,padding:"1rem"}}>
              <div style={{fontWeight:700,marginBottom:8}}>🕐 آخر المبيعات</div>
              {sales.slice(0,5).map(r=>(
                <div key={r.saleId} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+T.border,fontSize:13}}>
                  <span>{r.productName} — {r.customer.name}</span>
                  <span style={{color:T.green,fontWeight:700}}>${r.total.toFixed(2)}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── المخزن ── */}
        {page==="inventory"&&(
          <>
            <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
              <input placeholder="ابحث بالاسم أو الكود..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,flex:1}}/>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{...inp,width:148,cursor:"pointer"}}><option>الكل</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
            </div>
            {isAdmin&&(
              <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
                <button onClick={()=>exportExcel(products,"المخزون",["الاسم","التصنيف","سعر الشراء","سعر البيع","الكمية","الكود"],["name","category","buyPrice","sellPrice","quantity","sku"])} style={b({fontSize:12,padding:"6px 12px",color:T.green,borderColor:T.greenBg})}>📥 Excel</button>
                <button onClick={()=>exportPDF(`<div class="header"><h2>${STORE_NAME}</h2><h3>تقرير المخزون</h3></div><table><thead><tr><th>الاسم</th><th>التصنيف</th><th>سعر البيع</th><th>الكمية</th></tr></thead><tbody>${products.map(p=>`<tr><td>${p.name}</td><td>${p.category}</td><td>$${(p.sellPrice||0).toFixed(2)}</td><td>${p.quantity}</td></tr>`).join("")}</tbody></table>`)} style={b({fontSize:12,padding:"6px 12px",color:T.red,borderColor:T.redBg})}>📄 PDF</button>
              </div>
            )}

            </div>
          </div>
        )}

        {/* ── ملاحظات ── */}
        {page==="notes"&&isAdmin&&(
          <div style={{...card,padding:"1.5rem"}}>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="اكتب ملاحظاتك هنا..." style={{...inp,height:280,resize:"vertical",lineHeight:1.9}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
              <span style={{fontSize:11,color:T.sub}}>{notes.length} حرف</span>
              <button onClick={handleSaveNotes} style={{padding:"8px 24px",borderRadius:8,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:13,fontWeight:700}}>حفظ</button>
            </div>
          </div>
        )}
      </div>

      {/* ── نافذة البيع ── */}
      {saleModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"1rem"}}>
          <div style={{...card,padding:"1.75rem",width:"100%",maxWidth:420,maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{fontWeight:700,fontSize:17,marginBottom:4,color:T.accent}}>💰 تسجيل بيع</div>
            <div style={{fontSize:13,color:T.sub,marginBottom:"1rem",paddingBottom:"1rem",borderBottom:"1px solid "+T.border}}><b style={{color:T.text}}>{saleModal.name}</b> · المتوفر: <b style={{color:T.green}}>{saleModal.quantity}</b></div>
            <div style={{marginBottom:"1rem"}}><span style={lbl}>الكمية</span><input type="number" min={1} max={saleModal.quantity} value={saleQty} onChange={e=>setSaleQty(Math.max(1,Math.min(saleModal.quantity,parseInt(e.target.value)||1)))} style={{...inp,fontSize:16,fontWeight:700}}/></div>
            <div style={{background:T.statBg,borderRadius:10,padding:"12px",marginBottom:"1rem",fontSize:13}}>
              {[["سعر البيع","$"+(saleModal.sellPrice||0).toFixed(2),T.green],["الإجمالي","$"+((saleModal.sellPrice||0)*saleQty).toFixed(2),T.accent],["الكمية بعد البيع",(saleModal.quantity-saleQty)+" وحدة",sqColor(saleModal.quantity-saleQty)]].map(([l,v,c],i,arr)=>(<div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:i<arr.length-1?6:0,paddingBottom:i<arr.length-1?6:0,borderBottom:i<arr.length-1?"1px solid "+T.border:"none"}}><span style={{color:T.sub}}>{l}</span><b style={{color:c}}>{v}</b></div>))}
            </div>
            <div style={{fontWeight:700,fontSize:13,color:T.accent,marginBottom:8}}>👤 الزبون</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:"1rem"}}>
              <div><span style={lbl}>الاسم *</span><input value={cust.name} onChange={e=>setCust(c=>({...c,name:e.target.value}))} placeholder="أحمد محمد" style={inp}/></div>
              <div><span style={lbl}>الهاتف</span><input value={cust.phone} onChange={e=>setCust(c=>({...c,phone:e.target.value}))} placeholder="07X XXXX XXXX" style={inp}/></div>
              <div><span style={lbl}>ملاحظة</span><input value={cust.note} onChange={e=>setCust(c=>({...c,note:e.target.value}))} placeholder="نقداً / دين..." style={inp}/></div>
            </div>
            {custErr&&<div style={{marginBottom:10,fontSize:13,color:T.red,padding:"8px 12px",background:T.redBg,borderRadius:7}}>{custErr}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={confirmSale} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:T.sellBtn,color:T.sellBtnTxt,cursor:"pointer",fontSize:14,fontWeight:700}}>✅ تأكيد</button>
              <button onClick={()=>setSaleModal(null)} style={b({flex:1,color:T.sub,padding:"10px"})}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {/* ── نافذة الفاتورة بعد البيع ── */}
      {printInvoice&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:"1rem"}}>
          <div style={{...card,padding:"1.75rem",width:"100%",maxWidth:380}}>
            <div style={{fontWeight:700,fontSize:16,color:T.green,marginBottom:"1rem"}}>✅ تم تسجيل البيع</div>
            <div style={{fontSize:13,marginBottom:"1.25rem"}}>
              <div style={{marginBottom:4}}><b>{printInvoice.productName}</b></div>
              <div style={{color:T.sub}}>الزبون: {printInvoice.customer.name}</div>
              <div style={{color:T.sub}}>الكمية: {printInvoice.qty} · الإجمالي: <b style={{color:T.accent}}>${printInvoice.total.toFixed(2)}</b></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{printDiv(getInvoiceHtml(printInvoice));setPrintInvoice(null);}} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:13,fontWeight:700}}>🖨️ طباعة فاتورة</button>
              <button onClick={()=>setPrintInvoice(null)} style={b({flex:1,color:T.sub,padding:"9px"})}>تخطي</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── شاشة تسجيل الدخول ─────────────────────────────────
function LoginScreen({onLogin,T,themeName,setThemeName}){
  const[identifier,setIdentifier]=useState("");
  const[password,setPassword]=useState("");
  const[err,setErr]=useState("");
  const[showPass,setShowPass]=useState(false);

  function handleLogin(){
    if(!identifier.trim()||!password.trim()){setErr("يرجى إدخال اسم المستخدم وكلمة المرور");return;}
    const users=JSON.parse(localStorage.getItem("vape_users")||JSON.stringify(DEFAULT_USERS));
    const found=users.find(u=>(u.username===identifier.trim()||u.phone===identifier.trim())&&u.password===password);
    if(!found){setErr("اسم المستخدم أو كلمة المرور غير صحيحة");return;}
    onLogin(found);
  }

  const inp2={padding:"10px 12px",borderRadius:9,border:"1px solid "+T.border,background:T.input,color:T.text,fontSize:14,width:"100%",boxSizing:"border-box",textAlign:"right",direction:"rtl"};

  return(
    <div style={{background:T.bg,color:T.text,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',Tahoma,Arial,sans-serif",direction:"rtl"}}>
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:18,padding:"2.5rem 2rem",width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{fontSize:48,marginBottom:8}}>🌿</div>
          <h2 style={{fontSize:20,fontWeight:700,background:"linear-gradient(90deg,"+T.accent+","+T.green+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{STORE_NAME}</h2>
          <p style={{fontSize:12,color:T.sub,marginTop:4}}>نظام إدارة المخزون</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:"1.5rem"}}>
          <div>
            <div style={{fontSize:11,color:T.sub,marginBottom:4}}>اسم المستخدم أو رقم الهاتف</div>
            <input value={identifier} onChange={e=>setIdentifier(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="admin أو 07X..." style={inp2}/>
          </div>
          <div>
            <div style={{fontSize:11,color:T.sub,marginBottom:4}}>كلمة المرور</div>
            <div style={{position:"relative"}}>
              <input type={showPass?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••" style={{...inp2,paddingLeft:40}}/>
              <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.sub,fontSize:16}}>{showPass?"👁":"👁‍🗨"}</button>
            </div>
          </div>
        </div>
        {err&&<div style={{marginBottom:12,fontSize:13,color:T.red,padding:"8px 12px",background:T.redBg,borderRadius:7,textAlign:"center"}}>{err}</div>}
        <button onClick={handleLogin} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:T.accent,color:T.accentText,cursor:"pointer",fontSize:15,fontWeight:700,marginBottom:"1rem"}}>تسجيل الدخول</button>
        <div style={{textAlign:"center",fontSize:11,color:T.sub}}>
          <div>👑 المدير: admin / admin123</div>
          <div>👤 الموظف: staff / staff123</div>
        </div>
        <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:"1.25rem"}}>
          {Object.entries(THEMES).map(([k,v])=>(<button key={k} onClick={()=>setThemeName(k)} style={{padding:"4px 10px",borderRadius:12,border:"1px solid "+(k===themeName?T.accent:T.border),background:k===themeName?T.accent:"transparent",color:k===themeName?T.accentText:T.sub,cursor:"pointer",fontSize:11}}>{v.name}</button>))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
